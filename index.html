  const detailKeys = [
    [data.details.typeLabel || 'Type', data.details.type || '—'],
    ['Duration',      data.details.duration],
    ['Location',      data.details.location],
    ['Guests',        data.details.guests],
    ['Season',        data.details.season],
    ['Includes',      data.details.includes],
  ];

  return (
    <div style={{ background:'#FAF8F5' }}>

      {/* ── Full-Page Video Hero ───────────────────────────────────────── */}
      <div style={{ position:'relative', height:'100vh', minHeight:600,
        width:'100%', overflow:'hidden' }}>
        <VideoBg label={data.heroLabel || data.heroImg}>
          <div style={{
            position:'absolute', inset:0,
            background:'linear-gradient(180deg, rgba(0,0,0,0.30) 0%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.55) 100%)',
            display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', textAlign:'center',
            padding:'0 40px'
          }}>
            <div style={{ opacity:0, animation:'mv-fade-up 1.4s cubic-bezier(.2,.6,.2,1) .2s forwards' }}>
              <Logo size="md" light />
            </div>
            <h1 style={{
              marginTop:36, fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
              fontSize:'clamp(48px,7vw,96px)', fontWeight:300, color:'#FFFFFF',
              letterSpacing:'0.02em', lineHeight:0.98,
              opacity:0, animation:'mv-fade-up 1.5s cubic-bezier(.2,.6,.2,1) .55s forwards'
            }}>
              {data.title.toUpperCase()}
            </h1>
            <p style={{
              marginTop:18, fontFamily:'DM Sans, sans-serif',
              fontSize:11, fontWeight:300, letterSpacing:3,
              textTransform:'uppercase', lineHeight:1.9,
              color:'rgba(255,255,255,0.82)', maxWidth:720,
              opacity:0, animation:'mv-fade-up 1.5s cubic-bezier(.2,.6,.2,1) .8s forwards'
            }}>
              THE MIAVIA PHILOSOPHY<br/>
              DESIGNING MEMORIES FOR THOSE WHO EXPECT MORE
            </p>
          </div>
        </VideoBg>
      </div>

      {/* ── Description ───────────────────────────────────────────────── */}
      <Reveal>
        <div style={{ padding:'110px 40px 80px' }}>
          <div style={{ maxWidth:720, margin:'0 auto', textAlign:'center' }}>
            <p style={{ fontSize:10, letterSpacing:3, textTransform:'uppercase',
              color:'#8F857A', fontFamily:'DM Sans, sans-serif', marginBottom:24 }}>
              {data.details.location}
            </p>
            <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:15,
              fontWeight:300, color:'#5A534C', lineHeight:1.95 }}>
              {data.intro}
            </p>
          </div>
        </div>
      </Reveal>

      {/* ── Details + Carousel (side-by-side per the boss's wireframe) ──
             For experiences with subtypes (yoga: Mat Pilates / Yoga /
             Meditation; wine: Red / White / Champagne) we render one
             side-by-side block per subtype, each with its own labelled
             Experience Details and the experience's image carousel. */}
      {(() => {
        // Build the list of "panels" to render — either one (no subtypes)
        // or one per subtype (each with its specific overrides applied).
        const panels = data.subtypes && data.subtypes.length > 0
          ? data.subtypes.map((s) => ({
              heading: s.label,
              desc: s.desc,
              // Per-subtype carousel — falls back to the parent experience's
              // gallery if a subtype hasn't defined its own.
              carousel: (s.carousel && s.carousel.length > 0) ? s.carousel : data.carousel,
              keys: [
                [data.details.typeLabel || 'Type', s.label],
                ['Duration', s.duration || data.details.duration],
                ['Location', s.location || data.details.location],
                ['Guests',   s.guests   || data.details.guests],
                ['Season',   s.season   || data.details.season],
                ['Includes', s.includes || data.details.includes],
              ]
            }))
          : [{ heading: null, desc: null, keys: detailKeys, carousel: data.carousel }];
        return panels.map((p, pi) => {
          // Alternate sides for visual rhythm — odd-indexed panels flip the
          // image to the left and the details to the right.
          const flip = pi % 2 === 1;
          return (
          <div key={pi} style={{ background:'#FAF8F5',
            padding: pi === 0 ? '80px 40px 60px' : '20px 40px 60px' }}>
            <div style={{ maxWidth:1240, margin:'0 auto' }}>
              <Reveal>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr',
                  gap:80, alignItems:'flex-start' }}>
                  {/* Experience details */}
                  <div style={{ order: flip ? 1 : 0 }}>
                    <p style={{ fontSize:10, letterSpacing:3, textTransform:'uppercase',
                      color:'#8F857A', fontFamily:'DM Sans, sans-serif',
                      marginBottom:p.heading ? 12 : 32 }}>
                      Experience Details
                    </p>
                    {p.heading && (
                      <h3 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
                        fontWeight:400, fontSize:'clamp(24px,2.6vw,34px)',
                        color:'#111', letterSpacing:'0.04em',
                        textTransform:'uppercase', marginBottom:26 }}>
                        {p.heading}
                      </h3>
                    )}
                    <div>
                      {p.keys.map(([k,v], i)=>(
                        <div key={k} style={{
                          display:'grid', gridTemplateColumns:'150px 1fr',
                          alignItems:'baseline', gap:24,
                          padding:'16px 0',
                          borderTop: i===0 ? '1px solid #E8E2D9' : '1px solid #E8E2D9'
                        }}>
                          <p style={{ fontSize:10, letterSpacing:2.5, textTransform:'uppercase',
                            color:'#8F857A', fontFamily:'DM Sans, sans-serif',
                            margin:0, fontWeight:400 }}>
                            {k}
                          </p>
                          <p style={{ fontFamily:'Cormorant Garamond, serif', fontSize:15,
                            color:'#2A2418', lineHeight:1.5, fontWeight:300, margin:0 }}>
                            {v}
                          </p>
                        </div>
                      ))}
                    </div>
                  </div>
                  {/* Image carousel — unique gallery per subtype */}
                  {p.carousel && p.carousel.length > 0 && (
                    <div style={{ order: flip ? 0 : 1 }}>
                      <SimpleCarousel items={p.carousel} height={560} />
                    </div>
                  )}
                </div>
              </Reveal>
            </div>
          </div>
          );
        });
      })()}

      {/* ── Booking Form ──────────────────────────────────────────────── */}
      <ExperienceBookingForm exp={data} />

      <SiteFooter dark />
    </div>
  );
}

// ── Experience Booking Form — matched to property booking style ─────────
function ExperienceBookingForm({ exp }) {
  const { isLoaded, isSignedIn, isApproved, user } = useClerkUser();
  const { t } = useLanguage();
  const u = profileFromClerk(user);
  // Boss spec: destination dropdown limited to Var/Yacht; subtype picker
  // for yoga/wine; one-day vs multi-day toggle; free-form guests with
  // events welcome.
  const allowedDests = (typeof EXP_DESTINATIONS !== 'undefined' && EXP_DESTINATIONS[exp.id]) || ['flyosc','yachting'];
  const initial = {
    firstName: u.firstName || '',
    lastName:  u.lastName  || '',
    email:     u.email     || '',
    phone:     u.phone     || '',
    destination: allowedDests.length === 1 ? allowedDests[0] : '',
    subtype:'',
    dateMode:'one-day',
    date:'', endDate:'', time:'', guests:'', location:'', notes:''
  };
  const [form, setForm] = React.useState(initial);
  const [submitted, setSubmitted] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  React.useEffect(() => {
    if (!isSignedIn) return;
    setForm(f => ({
      ...f,
      firstName: f.firstName || u.firstName,
      lastName:  f.lastName  || u.lastName,
      email:     f.email     || u.email,
      phone:     f.phone     || u.phone,
    }));
  }, [isSignedIn, u.firstName, u.lastName, u.email, u.phone]);

  const onSubmit = (e) => {
    e.preventDefault();
    const bookingNumber = 'MV' + Date.now().toString().slice(-6);
    window.miaviaBooking = {
      property: exp.title,
      experiences:[{ id:exp.id, date:form.date, time:form.time }],
      firstName: form.firstName, lastName:form.lastName,
      email:form.email, phone:form.phone,
      guests:form.guests, notes:form.notes,
      checkIn:form.date, checkOut:form.date,
      bookingNumber,
      timestamp:Date.now()
    };
    // Forward booking details to Formspree → email + Slack so the
    // concierge has the inquiry the moment payment fires.
    if (MIAVIA_CONTACT_ENDPOINT) {
      try {
        fetch(MIAVIA_CONTACT_ENDPOINT, {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'accept': 'application/json' },
          body: JSON.stringify({
            _subject: 'New Miavia experience booking — ' + form.firstName + ' ' + form.lastName + ' for ' + exp.title,
            type: 'Experience booking',
            booking_number: bookingNumber,
            experience: exp.title + (form.subtype ? ' (' + form.subtype + ')' : ''),
            destination: form.destination,
            name: form.firstName + ' ' + form.lastName,
            email: form.email,
            phone: form.phone,
            stay_type: form.dateMode === 'multiple-days' ? 'Multiple days' : 'One day',
            date: form.date + (form.dateMode === 'multiple-days' && form.endDate ? ' → ' + form.endDate : ''),
            time: form.time,
            guests: form.guests,
            notes: form.notes
          })
        }).catch(() => {});
      } catch (_) { /* never block the user on this */ }
    }
    // Redirect to Stripe Payment Link for this experience if configured.
    // The booking_number is sent as client_reference_id so payments and
    // form submissions can be correlated in the Stripe dashboard.
    const stripeLinks = (typeof window !== 'undefined' && window.MIAVIA_STRIPE_LINKS) || {};
    const stripeUrl = stripeLinks[exp.id];
    if (stripeUrl) {
      const sep = stripeUrl.indexOf('?') === -1 ? '?' : '&';
      const params = new URLSearchParams({
        client_reference_id: bookingNumber,
        prefilled_email: form.email
      }).toString();
      window.location.href = stripeUrl + sep + params;
      return;
    }
    // Fallback: no Stripe link configured for this experience yet.
    window.navigateTo('confirmation');
  };

  // Dark aesthetic per the skeleton's bottom-booking-form reference.
  const inp = {
    width:'100%', padding:'14px 0', background:'transparent',
    border:'none', borderBottom:'1px solid rgba(255,255,255,0.22)',
    fontFamily:'DM Sans, sans-serif', fontSize:14, color:'#FAF8F5',
    outline:'none', fontWeight:300
  };
  const lbl = {
    display:'block', fontSize:9, letterSpacing:2.5, textTransform:'uppercase',
    color:'rgba(255,255,255,0.55)', fontFamily:'DM Sans, sans-serif', marginBottom:6
  };

  if(submitted) return null;

  // Auth gate — guests see a sign-in CTA in the booking-form slot.
  if (isLoaded && !isSignedIn) {
    return (
      <div style={{ background:'#0A0A0A', color:'#FAF8F5', padding:'120px 40px',
        borderTop:'1px solid rgba(255,255,255,0.08)' }}>
        <div style={{ maxWidth:560, margin:'0 auto', textAlign:'center' }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:24 }}>
            <Logo size="sm" tone="white" />
          </div>
          <h2 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(28px,3.6vw,44px)', fontWeight:400, color:'#FAF8F5',
            letterSpacing:'0.04em', marginBottom:18, textTransform:'uppercase' }}>
            {t('gate.members_only')}
          </h2>
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:17, color:'rgba(255,255,255,0.72)', lineHeight:1.6,
            maxWidth:480, margin:'0 auto 36px' }}>
            {t('gate.experience_reserved')}
          </p>
          <div style={{ display:'flex', gap:14, justifyContent:'center', flexWrap:'wrap' }}>
            <button onClick={()=>openSignIn()} style={{
              padding:'16px 44px', background:'#FAF8F5', color:'#0A0A0A',
              border:'1px solid #FAF8F5', fontSize:11, letterSpacing:3,
              textTransform:'uppercase', fontFamily:'DM Sans, sans-serif', cursor:'pointer'
            }}>{t('menu.signin')}</button>
            <button onClick={()=>openSignUp()} style={{
              padding:'16px 44px', background:'transparent', color:'#FAF8F5',
              border:'1px solid rgba(255,255,255,0.6)', fontSize:11, letterSpacing:3,
              textTransform:'uppercase', fontFamily:'DM Sans, sans-serif', cursor:'pointer'
            }}>{t('menu.become_member')}</button>
          </div>
        </div>
      </div>
    );
  }

  // Pending-approval gate
  if (isLoaded && isSignedIn && !isApproved) {
    return (
      <div style={{ background:'#0A0A0A', color:'#FAF8F5', padding:'120px 40px',
        borderTop:'1px solid rgba(255,255,255,0.08)' }}>
        <div style={{ maxWidth:560, margin:'0 auto', textAlign:'center' }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:24 }}>
            <Logo size="sm" tone="white" />
          </div>
          <h2 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(28px,3.6vw,44px)', fontWeight:400, color:'#FAF8F5',
            letterSpacing:'0.04em', marginBottom:18, textTransform:'uppercase' }}>
            {t('gate.pending_title')}
          </h2>
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:17, color:'rgba(255,255,255,0.72)', lineHeight:1.6,
            maxWidth:480, margin:'0 auto 14px' }}>
            {t('gate.pending_top')}
          </p>
          <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:13,
            color:'rgba(255,255,255,0.55)', lineHeight:1.7, maxWidth:480,
            margin:'0 auto' }}>
            {t('gate.pending_bottom_exp')}
          </p>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background:'#0A0A0A', color:'#FAF8F5', padding:'120px 40px',
      borderTop:'1px solid rgba(255,255,255,0.08)' }}>
      <div style={{ maxWidth:680, margin:'0 auto' }}>
        <div style={{ textAlign:'center', marginBottom:56 }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
            <Logo size="sm" tone="white" />
          </div>
          <p style={{ fontSize:10, letterSpacing:3, textTransform:'uppercase',
            color:'rgba(255,255,255,0.55)', fontFamily:'DM Sans, sans-serif', marginBottom:14 }}>
            {t('expbook.reserve')}
          </p>
          <h2 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(32px,4vw,52px)', fontWeight:400, color:'#FAF8F5',
            letterSpacing:'0.04em', marginBottom:16, textTransform:'uppercase' }}>
            {t('expbook.begin_your')} {exp.title}
          </h2>
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:17, color:'rgba(255,255,255,0.7)', lineHeight:1.6,
            maxWidth:480, margin:'0 auto' }}>
            {t('expbook.lead')}
          </p>
        </div>
        <form onSubmit={onSubmit} style={{ display:'flex', flexDirection:'column', gap:30 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:28 }}>
            <div>
              <label style={lbl}>{t('booking.first_name')}</label>
              <input style={inp} required value={form.firstName}
                onChange={e=>set('firstName', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.last_name')}</label>
              <input style={inp} required value={form.lastName}
                onChange={e=>set('lastName', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.email')}</label>
              <input style={inp} type="email" required value={form.email}
                onChange={e=>set('email', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.phone')}</label>
              <input style={inp} type="tel" value={form.phone}
                onChange={e=>set('phone', e.target.value)} />
            </div>
          </div>

          {/* Destination + (optional) Subtype — destination dropdown only
              shows when this experience is offered at more than one place. */}
          <div style={{ display:'grid', gridTemplateColumns: (typeof EXP_SUBTYPES !== 'undefined' && EXP_SUBTYPES[exp.id]) || allowedDests.length > 1 ? '1fr 1fr' : '1fr', gap:28 }}>
            {allowedDests.length > 1 && (
              <div>
                <label style={lbl}>{t('booking.destination')}</label>
                <select style={inp} required value={form.destination}
                  onChange={e=>set('destination', e.target.value)}>
                  <option value="" style={{color:'#111'}}>{t('booking.select')}</option>
                  {allowedDests.includes('flyosc') && (
                    <option value="flyosc" style={{color:'#111'}}>{t('booking.dest_var')}</option>
                  )}
                  {allowedDests.includes('yachting') && (
                    <option value="yachting" style={{color:'#111'}}>{t('booking.dest_yacht')}</option>
                  )}
                </select>
              </div>
            )}
            {(typeof EXP_SUBTYPES !== 'undefined' && EXP_SUBTYPES[exp.id]) && (
              <div>
                <label style={lbl}>{t('booking.type')}</label>
                <select style={inp} value={form.subtype}
                  onChange={e=>set('subtype', e.target.value)}>
                  <option value="" style={{color:'#111'}}>{t('booking.select')}</option>
                  {EXP_SUBTYPES[exp.id].map(s=>(
                    <option key={s} value={s} style={{color:'#111'}}>{s}</option>
                  ))}
                </select>
              </div>
            )}
          </div>

          {/* Date mode toggle: One Day / Multiple Days */}
          <div>
            <label style={lbl}>{t('booking.date')}</label>
            <div style={{ display:'flex', gap:0, marginTop:4, marginBottom:18,
              border:'1px solid rgba(255,255,255,0.22)', width:'fit-content' }}>
              {[
                { id:'one-day',       label: t('booking.one_day') },
                { id:'multiple-days', label: t('booking.multiple_days') }
              ].map(opt=>(
                <button key={opt.id} type="button"
                  onClick={()=>set('dateMode', opt.id)}
                  style={{
                    padding:'12px 24px', cursor:'pointer',
                    background: form.dateMode===opt.id ? '#FAF8F5' : 'transparent',
                    color: form.dateMode===opt.id ? '#0A0A0A' : 'rgba(255,255,255,0.78)',
                    border:'none',
                    fontSize:10, letterSpacing:2.2, textTransform:'uppercase',
                    fontFamily:'DM Sans, sans-serif', transition:'all 0.3s ease'
                  }}>
                  {opt.label}
                </button>
              ))}
            </div>
            {form.dateMode === 'multiple-days' ? (
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:28 }}>
                <div>
                  <label style={lbl}>{t('booking.start')}</label>
                  <input style={inp} type="date" required value={form.date}
                    onChange={e=>set('date', e.target.value)} />
                </div>
                <div>
                  <label style={lbl}>{t('booking.end')}</label>
                  <input style={inp} type="date" required value={form.endDate}
                    onChange={e=>set('endDate', e.target.value)} />
                </div>
                <div>
                  <label style={lbl}>{t('booking.time')}</label>
                  <input style={inp} type="time" value={form.time}
                    onChange={e=>set('time', e.target.value)} />
                </div>
              </div>
            ) : (
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:28 }}>
                <div>
                  <label style={lbl}>{t('booking.date')}</label>
                  <input style={inp} type="date" required value={form.date}
                    onChange={e=>set('date', e.target.value)} />
                </div>
                <div>
                  <label style={lbl}>{t('booking.time')}</label>
                  <input style={inp} type="time" value={form.time}
                    onChange={e=>set('time', e.target.value)} />
                </div>
              </div>
            )}
          </div>

          <div>
            <label style={lbl}>{t('booking.guests')}</label>
            <input style={inp} type="number" min="1" value={form.guests}
              onChange={e=>set('guests', e.target.value)}
              placeholder={t('booking.guests_placeholder')} />
          </div>

          {/* Per-person / per-group pricing — pulled from EXP_PRICING */}
          {typeof EXP_PRICING !== 'undefined' && EXP_PRICING[exp.id] && (
            <div style={{ textAlign:'center', borderTop:'1px solid rgba(255,255,255,0.12)',
              borderBottom:'1px solid rgba(255,255,255,0.12)', padding:'18px 0' }}>
              <p style={{ fontSize:9, letterSpacing:3, textTransform:'uppercase',
                color:'rgba(255,255,255,0.5)', fontFamily:'DM Sans, sans-serif',
                marginBottom:6 }}>
                {t('common.from')}
              </p>
              <p style={{ fontFamily:"'Playfair Display', serif", fontSize:24,
                fontWeight:300, color:'#FAF8F5', letterSpacing:'0.04em' }}>
                {EXP_PRICING[exp.id].label}
              </p>
            </div>
          )}

          <div>
            <label style={lbl}>{t('booking.notes')}</label>
            <textarea
              rows={3}
              value={form.notes}
              onChange={e=>set('notes', e.target.value)}
              placeholder={t('booking.notes_placeholder')}
              style={{ ...inp, padding:'14px 0', resize:'vertical' }} />
          </div>
          <div style={{ display:'flex', justifyContent:'center', marginTop:16 }}>
            <button type="submit" style={{
              padding:'18px 60px', background:'#FAF8F5',
              border:'1px solid #FAF8F5', color:'#0A0A0A',
              fontSize:11, letterSpacing:3, textTransform:'uppercase',
              fontFamily:'DM Sans, sans-serif', fontWeight:400,
              cursor:'pointer', transition:'all 0.4s ease'
            }}
              onMouseEnter={e=>{ e.currentTarget.style.background='#7A1F2B'; e.currentTarget.style.color='#FAF8F5'; e.currentTarget.style.borderColor='#7A1F2B'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='#FAF8F5'; e.currentTarget.style.color='#0A0A0A'; e.currentTarget.style.borderColor='#FAF8F5'; }}>
              {t('booking.continue')}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── Experience Enquiry Form ────────────────────────────────────────────────
function ExperienceEnquiryPage({ exp, onBack }) {
  const data = EXP_DATA[exp] || {};
  const [form, setForm] = React.useState({
    firstName:'', lastName:'', email:'', phone:'',
    date:'', guests:'', location:'',
    dietary:'', winePref:'', ridingLevel:'',
    requests:''
  });
  const [submitted, setSubmitted] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const needsDietary  = exp === 'cooking' || exp === 'truffle';
  const needsWine     = exp === 'wine';
  const needsRiding   = exp === 'horses';

  if(submitted) return <FormSuccess onBack={()=>{ setSubmitted(false); window.navigateTo('home'); }} />;

  return (
    <div style={{ background:'#FAF8F5', paddingTop:90, minHeight:'100vh' }}>
      <div style={{ maxWidth:640, margin:'0 auto', padding:'52px 40px 100px' }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer',
          display:'flex', alignItems:'center', gap:8, marginBottom:40,
          fontSize:10, letterSpacing:2, textTransform:'uppercase', color:'#9A9089',
          fontFamily:'DM Sans, sans-serif' }}>

// ── Contact Page ───────────────────────────────────────────────────────────
function ContactPage() {
  // Members-only Contact page (boss spec): if the visitor isn't signed in,
  // show the AuthGate with sign-in / sign-up CTAs. Otherwise pre-fill the
  // form from their Clerk profile.
  const { isLoaded, isSignedIn, isApproved, user } = useClerkUser();
  const { t } = useLanguage();
  const profile = profileFromClerk(user);

  const [form, setForm] = React.useState(() => ({
    firstName: profile.firstName,
    lastName:  profile.lastName,
    email:     profile.email,
    countryCode:'+33',
    phone:     profile.phone,
    topic:'', details:'',
    website:'' // honeypot — real users never fill this
  }));
  // Keep the form in sync with the Clerk profile once it arrives.
  React.useEffect(() => {
    if (!isSignedIn) return;
    setForm(f => ({
      ...f,
      firstName: f.firstName || profile.firstName,
      lastName:  f.lastName  || profile.lastName,
      email:     f.email     || profile.email,
      phone:     f.phone     || profile.phone,
    }));
  }, [isSignedIn, profile.firstName, profile.lastName, profile.email, profile.phone]);

  const [submitted, setSubmitted] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [error, setError] = React.useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Auth gate — block guests entirely.
  if (isLoaded && !isSignedIn) {
    return (
      <AuthGate
        title="Reach the Miavia Team"
        message="Membership is required to begin a conversation. Sign in to your account or apply for membership to continue." />
    );
  }
  // Pending-approval gate — applicant signed up but not yet approved.
  if (isLoaded && isSignedIn && !isApproved) {
    return (
      <AuthGate
        title={t('gate.pending_title')}
        message={t('gate.pending_bottom_contact')} />
    );
  }
  if (!isLoaded) {
    return (
      <div style={{ minHeight:'100vh', background:'#FAF8F5',
        display:'flex', alignItems:'center', justifyContent:'center',
        fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
        color:'#9A9089' }}>
        Loading…
      </div>
    );
  }

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    if (!form.firstName || !form.lastName || !form.email) {
      setError('Please fill in your name and email.');
      return;
    }
    setSubmitting(true);
    try {
      // Prefer the Formspree endpoint if configured. Falls back to the
      // custom Node backend (MIAVIA_API_BASE) for self-hosted deployments.
      const usingFormspree = !!MIAVIA_CONTACT_ENDPOINT;
      const url = usingFormspree
        ? MIAVIA_CONTACT_ENDPOINT
        : `${MIAVIA_API_BASE}/api/contact`;
      // Formspree returns a friendly {ok:true|false} shape when you ask for JSON.
      const payload = usingFormspree
        ? {
            name:   `${form.firstName} ${form.lastName}`,
            email:  form.email,
            phone:  [form.countryCode, form.phone].filter(Boolean).join(' '),
            topic:  form.topic,
            message: form.details,
            _subject: `New Miavia contact — ${form.firstName} ${form.lastName}`,
            _gotcha: form.website // Formspree's honeypot field name
          }
        : form;
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'accept': 'application/json'
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = (data && (data.error || (data.errors && data.errors[0] && data.errors[0].message)))
          || `Request failed (${res.status}).`;
        throw new Error(msg);
      }
      // Node backend answers {ok:true}; Formspree answers {ok:true,next:…}
      if (data.ok === false) throw new Error(data.error || 'Submission rejected.');
      setSubmitted(true);
    } catch (err) {
      setError(err.message || 'Could not send your message. Please try again.');
    } finally {
      setSubmitting(false);
    }
  };

  const codes = [
    {value:'+33',label:'+33'}, {value:'+377',label:'+377'},
    {value:'+39',label:'+39'}, {value:'+44',label:'+44'},
    {value:'+1',label:'+1'},   {value:'+49',label:'+49'},
    {value:'+41',label:'+41'}, {value:'+34',label:'+34'},
  ];

  const inp = {
    width:'100%', padding:'14px 0', background:'transparent',
    border:'none', borderBottom:'1px solid #D5CFC5',
    fontFamily:'DM Sans, sans-serif', fontSize:14, color:'#111',
    outline:'none', fontWeight:300
  };
  const lbl = {
    display:'block', fontSize:10, letterSpacing:2.5, textTransform:'uppercase',
    color:'#8F857A', fontFamily:'DM Sans, sans-serif', marginBottom:6
  };

  return (
    <div style={{ background:'#FAF8F5', minHeight:'100vh',
      color:'#111', paddingTop:90 }}>
      {submitted ? (
        <div style={{ minHeight:'calc(100vh - 90px)', display:'flex',
          flexDirection:'column', alignItems:'center', justifyContent:'center',
          textAlign:'center', padding:'80px 40px' }}>
          <Logo size="md" />
          <h1 style={{ marginTop:40, fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(36px,5vw,60px)', fontWeight:400, color:'#111',
            letterSpacing:'0.01em' }}>
            Thank you.
          </h1>
          <p style={{ marginTop:22, fontFamily:'Cormorant Garamond, serif',
            fontStyle:'italic', fontSize:19, color:'#6B6158',
            maxWidth:480, lineHeight:1.55 }}>
            Your message has been received. A member of the Miavia team will
            reply to you personally, typically within one business day.
          </p>
          <div style={{ marginTop:40 }}>
            <BtnLight onClick={()=>window.navigateTo('home')}>Return Home</BtnLight>
          </div>
        </div>
      ) : (
        <div style={{ maxWidth:640, margin:'0 auto', padding:'70px 40px 80px',
          textAlign:'center' }}>
          <div style={{ display:'inline-block', marginBottom:40 }}>
            <Logo size="sm" />
          </div>
          <h1 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(36px,5vw,56px)', fontWeight:400, color:'#111',
            letterSpacing:'0.02em', marginBottom:60, textTransform:'uppercase' }}>
            Share Your Story
          </h1>

          <form onSubmit={submit}
            style={{ display:'flex', flexDirection:'column', gap:28,
              textAlign:'left' }}>

            {/* Honeypot — hidden from real users, fills up with bots. */}
            <div aria-hidden="true" style={{ position:'absolute', left:'-9999px',
              width:1, height:1, overflow:'hidden' }}>
              <label>Website
                <input type="text" tabIndex={-1} autoComplete="off"
                  value={form.website} onChange={e=>set('website',e.target.value)} />
              </label>
            </div>

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:28 }}>
              <div>
                <label style={lbl}>*First Name</label>
                <input style={inp} required value={form.firstName}
                  onChange={e=>set('firstName',e.target.value)} />
              </div>
              <div>
                <label style={lbl}>*Last Name</label>
                <input style={inp} required value={form.lastName}
                  onChange={e=>set('lastName',e.target.value)} />
              </div>
            </div>

            <div>
              <label style={lbl}>*Email</label>
              <input style={inp} type="email" required value={form.email}
                onChange={e=>set('email',e.target.value)} />
            </div>

            <div style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:20 }}>
              <div>
                <label style={lbl}>Country Code</label>
                <select style={inp} value={form.countryCode}
                  onChange={e=>set('countryCode',e.target.value)}>
                  {codes.map(c=>(
                    <option key={c.value} value={c.value}>{c.label}</option>
                  ))}
                </select>
              </div>
              <div>
                <label style={lbl}>Phone Number</label>
                <input style={inp} type="tel" value={form.phone}
                  onChange={e=>set('phone',e.target.value)} />
              </div>
            </div>

            <div>
              <label style={lbl}>Topic</label>
              <input style={inp} value={form.topic}
                onChange={e=>set('topic',e.target.value)} />
            </div>

            <div style={{ border:'1px solid #D5CFC5', padding:'18px 20px',
              background:'#FFFFFF' }}>
              <textarea
                rows={4}
                value={form.details}
                onChange={e=>set('details',e.target.value)}
                placeholder="Add additional details to help us address your inquires."
                style={{ width:'100%', background:'transparent',
                  border:'none', outline:'none', resize:'vertical',
                  fontFamily:'DM Sans, sans-serif', fontSize:13.5,
                  color:'#3A322A', lineHeight:1.7, fontWeight:300 }} />
            </div>

            {error && (
              <div role="alert" style={{ padding:'12px 16px',
                border:'1px solid #C9A6A6', background:'#FBF3F3',
                color:'#7A1F2B', fontFamily:'DM Sans, sans-serif',
                fontSize:13, lineHeight:1.6 }}>
                {error}
              </div>
            )}

            <div style={{ display:'flex', justifyContent:'center', marginTop:10 }}>
              <button type="submit" disabled={submitting} style={{
                padding:'16px 60px',
                background: submitting ? '#9A9089' : 'transparent',
                border:'1px solid #111',
                color: submitting ? '#FAF8F5' : '#111',
                fontSize:11, letterSpacing:3, textTransform:'uppercase',
                fontFamily:'DM Sans, sans-serif',
                cursor: submitting ? 'default' : 'pointer',
                opacity: submitting ? 0.85 : 1,
                transition:'all 0.4s ease'
              }}
                onMouseEnter={e=>{ if(!submitting){ e.currentTarget.style.background='#111'; e.currentTarget.style.color='#FAF8F5'; } }}
                onMouseLeave={e=>{ if(!submitting){ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#111'; } }}>
                {submitting ? 'Sending…' : 'Send'}
              </button>
            </div>
          </form>
        </div>
      )}

      {/* Bottom banner per skeleton */}
      <div style={{ borderTop:'1px solid #E8E2D9', padding:'28px 40px',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        flexWrap:'wrap', gap:16, background:'#FAF8F5' }}>
        <div style={{ display:'flex', gap:28 }}>
          <span onClick={()=>window.open(INSTAGRAM_URL,'_blank','noopener')}
            style={{ fontSize:10, letterSpacing:2.4, textTransform:'uppercase',
              color:'#8F857A', fontFamily:'DM Sans, sans-serif', cursor:'pointer' }}>
            Instagram
          </span>
          <span onClick={()=>window.navigateTo('contact')}
            style={{ fontSize:10, letterSpacing:2.4, textTransform:'uppercase',
              color:'#8F857A', fontFamily:'DM Sans, sans-serif', cursor:'pointer' }}>
            Contact
          </span>
        </div>
      </div>
    </div>
  );
}

function SignInPage({ mode='signin' }) {
  // Login mode: mount Clerk's polished SignIn component.
  // Signup mode: render our custom form that collects all 7 fields the boss
  // requested and creates the account via Clerk's lower-level signUp API.
  const isSignIn = mode==='signin'; // signup mode
  const { isLoaded, isSignedIn } = useClerkUser();

  // If already signed in, send them home.
  React.useEffect(() => {
    if (isSignedIn && typeof window !== 'undefined' && window.navigateTo) {
      window.navigateTo('home');
    }
  }, [isSignedIn]);

  if (isSignIn) {
    return <CustomSignUpForm />;
  }

  // Login mode → mount Clerk's <SignIn /> component
  return <ClerkSignInWrapper />;
}

// ── Custom Sign-Up Form (all 7 fields) ─────────────────────────────────────
function CustomSignUpForm() {
  const { t } = useLanguage();
  const [step, setStep] = React.useState('details'); // 'details' | 'verify'
  const [form, setForm] = React.useState({
    firstName:'', lastName:'', email:'', password:'',
    countryCode:'+33', phone:'',
    birthday:'', language:'English'
  });
  const [code, setCode] = React.useState('');
  const [error, setError] = React.useState('');
  const [submitting, setSubmitting] = React.useState(false);
  const set = (k,v) => setForm(f=>({ ...f, [k]:v }));

  const codes = [
    {value:'+33',label:'+33 France'}, {value:'+377',label:'+377 Monaco'},
    {value:'+39',label:'+39 Italy'}, {value:'+44',label:'+44 UK'},
    {value:'+1',label:'+1 US/CA'}, {value:'+49',label:'+49 Germany'},
    {value:'+41',label:'+41 Switzerland'}, {value:'+34',label:'+34 Spain'},
  ];
  const languages = ['English','Français','Italiano','Español','Deutsch'];

  const inp = {
    width:'100%', padding:'12px 14px', background:'#FFFFFF',
    border:'1px solid #D5CFC5', borderRadius:0,
    fontFamily:'DM Sans, sans-serif', fontSize:14, color:'#111',
    outline:'none', fontWeight:300
  };
  const lbl = {
    display:'block', fontSize:10, letterSpacing:2.5, textTransform:'uppercase',
    color:'#8F857A', fontFamily:'DM Sans, sans-serif', marginBottom:6
  };

  // ── Step 1: collect details + create account
  const submitDetails = async (e) => {
    e.preventDefault();
    setError('');
    if (!form.firstName || !form.lastName || !form.email || !form.password) {
      setError('Please fill in name, email, and password.');
      return;
    }
    if (!window.Clerk || !window.Clerk.client) {
      setError('Authentication is still loading — please try again in a moment.');
      return;
    }
    setSubmitting(true);
    try {
      // Save the custom fields (birthday, language, phone) as user metadata.
      const phoneE164 = form.phone
        ? (form.countryCode + form.phone).replace(/\s/g, '')
        : '';
      await window.Clerk.client.signUp.create({
        emailAddress: form.email,
        password:     form.password,
        firstName:    form.firstName,
        lastName:     form.lastName,
        unsafeMetadata: {
          birthday:    form.birthday,
          language:    form.language,
          countryCode: form.countryCode,
          phone:       form.phone,
          phoneE164
        }
      });
      // Trigger the email verification code.
      await window.Clerk.client.signUp.prepareEmailAddressVerification({
        strategy: 'email_code'
      });
      setStep('verify');
    } catch (err) {
      const msg = err.errors && err.errors[0]
        ? (err.errors[0].longMessage || err.errors[0].message)
        : (err.message || 'Could not create your account.');
      setError(msg);
    } finally {
      setSubmitting(false);
    }
  };

  // ── Step 2: enter verification code
  // After Clerk verifies the email, we:
  //   1. Briefly establish the session (to allow setting metadata).
  //   2. Stamp the user as `membershipStatus: 'pending'` + capture appliedAt.
  //   3. Post the applicant's details to Slack via Formspree.
  //   4. Sign the user out — they cannot access member areas yet.
  //   5. Redirect to the "Application Received" page.
  // The boss/concierge then approves them in the Clerk dashboard by setting
  // unsafeMetadata.membershipStatus = 'approved'. See MEMBERSHIP_APPROVAL.md.
  const submitCode = async (e) => {
    e.preventDefault();
    setError('');
    if (!code || code.length < 4) {
      setError('Enter the 6-digit code we sent to your email.');
      return;
    }
    setSubmitting(true);
    try {
      const result = await window.Clerk.client.signUp.attemptEmailAddressVerification({ code });
      if (result.status === 'complete') {
        // Activate the session briefly so we can stamp metadata.
        await window.Clerk.setActive({ session: result.createdSessionId });
        // Stamp pending status onto the user.
        try {
          if (window.Clerk.user) {
            await window.Clerk.user.update({
              unsafeMetadata: {
                ...(window.Clerk.user.unsafeMetadata || {}),
                membershipStatus: 'pending',
                appliedAt: new Date().toISOString()
              }
            });
          }
        } catch (_) { /* metadata write is non-blocking */ }
        // Notify the concierge in Slack via Formspree.
        if (typeof MIAVIA_CONTACT_ENDPOINT !== 'undefined' && MIAVIA_CONTACT_ENDPOINT) {
          try {
            fetch(MIAVIA_CONTACT_ENDPOINT, {
              method: 'POST',
              headers: { 'content-type':'application/json', 'accept':'application/json' },
              body: JSON.stringify({
                _subject: 'New Miavia membership application — ' + form.firstName + ' ' + form.lastName,
                type: 'Membership application',
                name: form.firstName + ' ' + form.lastName,
                email: form.email,
                phone: [form.countryCode, form.phone].filter(Boolean).join(' '),
                birthday: form.birthday,
                language: form.language,
                applied_at: new Date().toISOString(),
                approval_link: 'https://dashboard.clerk.com'
              })
            }).catch(()=>{});
          } catch (_) { /* never block sign-up on this */ }
        }
        // Sign the user out — pending applicants don't get access yet.
        try { await window.Clerk.signOut(); } catch (_) {}
        if (window.navigateTo) window.navigateTo('pending-review');
      } else {
        setError('Verification incomplete — please try again.');
      }
    } catch (err) {
      const msg = err.errors && err.errors[0]
        ? (err.errors[0].longMessage || err.errors[0].message)
        : (err.message || 'Verification failed.');
      setError(msg);
    } finally {
      setSubmitting(false);
    }
  };

  const resendCode = async () => {
    if (!window.Clerk || !window.Clerk.client) return;
    setError('');
    try {
      await window.Clerk.client.signUp.prepareEmailAddressVerification({
        strategy: 'email_code'
      });
    } catch (err) {
      setError('Could not resend the code. Please try again.');
    }
  };

  return (
    <div style={{ minHeight:'100vh', background:'#FAF8F5',
      padding:'110px 40px 80px' }}>
      <div style={{ maxWidth:680, margin:'0 auto', textAlign:'center' }}>
        <div style={{ display:'inline-block', marginBottom:30 }}>
          <Logo size="md" />
        </div>
        <h1 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
          fontSize:'clamp(32px,4.2vw,52px)', fontWeight:400, color:'#111',
          lineHeight:1.1, letterSpacing:'0.04em', marginBottom:14,
          textTransform:'uppercase' }}>
          {step === 'verify' ? t('signup.verify_title') : t('signup.title')}
        </h1>
        <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
          fontSize:17, color:'#6B6158', marginBottom:48, lineHeight:1.55 }}>
          {step === 'verify'
            ? t('signup.verify_lead') + form.email + '.'
            : t('signup.lead')}
        </p>

        {error && (
          <div role="alert" style={{ padding:'12px 16px', marginBottom:24,
            border:'1px solid #C9A6A6', background:'#FBF3F3', color:'#7A1F2B',
            fontFamily:'DM Sans, sans-serif', fontSize:13, lineHeight:1.6,
            textAlign:'left' }}>
            {error}
          </div>
        )}

        {step === 'details' ? (
          <form onSubmit={submitDetails}
            style={{ display:'flex', flexDirection:'column', gap:24, textAlign:'left' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
              <div>
                <label style={lbl}>{t('signup.first_name')}</label>
                <input style={inp} required value={form.firstName}
                  onChange={e=>set('firstName', e.target.value)} />
              </div>
              <div>
                <label style={lbl}>{t('signup.last_name')}</label>
                <input style={inp} required value={form.lastName}
                  onChange={e=>set('lastName', e.target.value)} />
              </div>
            </div>
            <div>
              <label style={lbl}>{t('signup.email')}</label>
              <input style={inp} type="email" required value={form.email}
                onChange={e=>set('email', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('signup.password')}</label>
              <input style={inp} type="password" required value={form.password}
                onChange={e=>set('password', e.target.value)}
                minLength={8} />
              <p style={{ fontSize:11, color:'#9A9089', marginTop:6,
                fontFamily:'DM Sans, sans-serif', fontStyle:'italic' }}>
                {t('signup.password_min')}
              </p>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:20 }}>
              <div>
                <label style={lbl}>{t('signup.country_code')}</label>
                <select style={inp} value={form.countryCode}
                  onChange={e=>set('countryCode', e.target.value)}>
                  {codes.map(c=>(
                    <option key={c.value} value={c.value}>{c.label}</option>
                  ))}
                </select>
              </div>
              <div>
                <label style={lbl}>{t('signup.phone')}</label>
                <input style={inp} type="tel" value={form.phone}
                  onChange={e=>set('phone', e.target.value)} />
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
              <div>
                <label style={lbl}>{t('signup.birthday')}</label>
                <input style={inp} type="date" value={form.birthday}
                  onChange={e=>set('birthday', e.target.value)} />
              </div>
              <div>
                <label style={lbl}>{t('signup.language_field')}</label>
                <select style={inp} value={form.language}
                  onChange={e=>set('language', e.target.value)}>
                  {languages.map(l=>(
                    <option key={l} value={l}>{l}</option>
                  ))}
                </select>
              </div>
            </div>
            <div style={{ display:'flex', justifyContent:'center', marginTop:18 }}>
              <button type="submit" disabled={submitting} style={{
                padding:'16px 56px',
                background: submitting ? '#9A9089' : '#7A1F2B',
                color:'#FAF8F5', border:'1px solid '+(submitting?'#9A9089':'#7A1F2B'),
                fontSize:11, letterSpacing:3, textTransform:'uppercase',
                fontFamily:'DM Sans, sans-serif',
                cursor: submitting ? 'default' : 'pointer',
                opacity: submitting ? 0.85 : 1,
                transition:'all 0.4s ease'
              }}
                onMouseEnter={e=>{ if(!submitting) e.currentTarget.style.background='#5E1620'; }}
                onMouseLeave={e=>{ if(!submitting) e.currentTarget.style.background='#7A1F2B'; }}>
                {submitting ? t('signup.creating') : t('signup.create')}
              </button>
            </div>
            <p style={{ textAlign:'center', fontFamily:'DM Sans, sans-serif',

          <form onSubmit={submitCode}
            style={{ display:'flex', flexDirection:'column', gap:24, textAlign:'left',

              <label style={lbl}>{t('signup.code')}</label>
              <input style={{ ...inp, fontSize:18, letterSpacing:8,
                textAlign:'center' }}

                onChange={e=>setCode(e.target.value.replace(/\D/g,''))} />
            </div>
            <div style={{ display:'flex', justifyContent:'center', marginTop:8 }}>
              <button type="submit" disabled={submitting} style={{
                padding:'16px 56px',
                background: submitting ? '#9A9089' : '#7A1F2B',
                color:'#FAF8F5', border:'1px solid '+(submitting?'#9A9089':'#7A1F2B'),
                fontSize:11, letterSpacing:3, textTransform:'uppercase',
                fontFamily:'DM Sans, sans-serif',
                cursor: submitting ? 'default' : 'pointer',
                opacity: submitting ? 0.85 : 1,
                transition:'all 0.4s ease'
              }}>
                {submitting ? t('signup.verifying') : t('signup.verify')}
              </button>
            </div>
            <p style={{ textAlign:'center', fontFamily:'DM Sans, sans-serif',
              fontSize:12, color:'#9A9089' }}>
              {t('signup.didnt_receive')}{' '}
              <span onClick={resendCode} style={{ color:'#7A1F2B',
                cursor:'pointer', textDecoration:'underline', textUnderlineOffset:3 }}>
                {t('signup.resend')}
              </span>
            </p>
          </form>
        )}
      </div>
    </div>
  );
}

// ── Clerk Sign-In Wrapper (for login mode only) ────────────────────────────
function ClerkSignInWrapper() {
  const ref = React.useRef(null);
  const { isLoaded, isSignedIn } = useClerkUser();
  const { t } = useLanguage();
  React.useEffect(() => {
    if (!ref.current) return;
    if (!window.Clerk || !window.Clerk.loaded) return;
    if (isSignedIn) return;
    window.Clerk.mountSignIn(ref.current, {
      appearance: MIAVIA_CLERK_APPEARANCE,
      afterSignInUrl: '/',
      signUpUrl: '#signin'
    });
    return () => { try { window.Clerk.unmountSignIn(ref.current); } catch (_) {} };
  }, [isLoaded, isSignedIn]);
  return (
    <div style={{ minHeight:'100vh', background:'#FAF8F5',
      padding:'110px 40px 80px' }}>
      <div style={{ maxWidth:580, margin:'0 auto', textAlign:'center' }}>
        <div style={{ display:'inline-block', marginBottom:30 }}>
          <Logo size="md" />
        </div>
        <h1 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
          fontSize:'clamp(32px,4.2vw,52px)', fontWeight:400, color:'#111',
          lineHeight:1.05, letterSpacing:'0.04em', marginBottom:48,
          textTransform:'uppercase' }}>
          {t('signin.title')}
        </h1>
        <div style={{ display:'flex', justifyContent:'center' }}>
          <div ref={ref} />
        </div>
        {!isLoaded && (
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:16, color:'#9A9089', marginTop:24 }}>
            Loading…
          </p>
        )}
      </div>
    </div>
  );
}

// ── Cookie Consent Banner ──────────────────────────────────────────────────
// Shown to first-time visitors. Strictly-necessary cookies only (Clerk auth +
// language preference) — under GDPR these are exempt from explicit consent,
// but a banner is still good practice and means we're set up cleanly when
// analytics/marketing cookies are added later. Persists choice in
// localStorage so the banner doesn't reappear after dismissal.
function CookieBanner() {
  const { t } = useLanguage();
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    try {
      const stored = window.localStorage.getItem('miavia-cookie-consent');
      if (!stored) {
        // Slight delay so the banner doesn't fight the home page intro fade
        const id = window.setTimeout(() => setShow(true), 1800);
        return () => window.clearTimeout(id);
      }
    } catch (_) { setShow(true); }
  }, []);
  const accept = () => {
    try { window.localStorage.setItem('miavia-cookie-consent', 'accepted'); } catch (_) {}
    setShow(false);
  };
  if (!show) return null;
  return (
    <div role="region" aria-label="cookie consent"
      style={{
        // Anchored to both sides so it can never overflow on wide viewports;
        // margin:auto centres it within the available space, capped by maxWidth.
        position:'fixed', bottom:20, left:20, right:20,
        marginLeft:'auto', marginRight:'auto', maxWidth:880,
        zIndex:200,
        background:'rgba(10,10,10,0.94)', color:'#FAF8F5',
        backdropFilter:'saturate(1.1) blur(10px)',
        WebkitBackdropFilter:'saturate(1.1) blur(10px)',
        border:'1px solid rgba(255,255,255,0.12)',
        boxShadow:'0 24px 60px -20px rgba(12,9,6,0.5)',
        padding:'18px 22px',
        display:'flex', alignItems:'center', gap:18, flexWrap:'wrap',
        animation:'mv-fade-up 0.6s cubic-bezier(.2,.6,.2,1) both'
      }}>
      <p style={{
        flex:'1 1 260px', margin:0, minWidth:0,
        fontFamily:'DM Sans, sans-serif', fontSize:12.5, lineHeight:1.6,
        color:'rgba(255,255,255,0.85)', fontWeight:300
      }}>
        {t('cookies.message')}{' '}
        <span onClick={()=>window.navigateTo('privacy')} style={{
          color:'#FAF8F5', textDecoration:'underline', textUnderlineOffset:3,
          cursor:'pointer', fontWeight:400
        }}>
          {t('cookies.policy_link')}
        </span>
      </p>
      <button onClick={accept} style={{
        padding:'10px 22px', background:'#FAF8F5', color:'#0A0A0A',
        border:'1px solid #FAF8F5',
        fontSize:10, letterSpacing:2.5, textTransform:'uppercase',
        fontFamily:'DM Sans, sans-serif', cursor:'pointer',
        transition:'all 0.4s ease', whiteSpace:'nowrap',
        flexShrink:0
      }}
        onMouseEnter={e=>{ e.currentTarget.style.background='#7A1F2B'; e.currentTarget.style.color='#FAF8F5'; e.currentTarget.style.borderColor='#7A1F2B'; }}
        onMouseLeave={e=>{ e.currentTarget.style.background='#FAF8F5'; e.currentTarget.style.color='#0A0A0A'; e.currentTarget.style.borderColor='#FAF8F5'; }}>
        {t('cookies.accept')}
      </button>
    </div>
  );
}

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('mv_page') || 'home');
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  // ── Directional page transition state ───────────────────────────────────
  // When a DirNav arrow is clicked the outgoing page slides off-screen in
  // the opposite direction and the incoming page slides in from the direction
  // of travel. For all other navigation the transition is a gentle fade.
  const [prevPage, setPrevPage] = React.useState(null);
  const [transitionDir, setTransitionDir] = React.useState(null);
  const TRANSITION_MS = 850;

  window.navigateTo = React.useCallback((p, dir) => {
    if (dir && p !== page) {
      setPrevPage(page);
      setTransitionDir(dir);
      setPage(p);
      localStorage.setItem('mv_page', p);
      window.scrollTo({ top: 0, behavior: 'instant' });
      window.setTimeout(() => {
        setPrevPage(null);
        setTransitionDir(null);
      }, TRANSITION_MS);
    } else {
      setPage(p);
      localStorage.setItem('mv_page', p);
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
  }, [page]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data && e.data.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data && e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const applyTweak = (key, val) => {
    setTweaks(t => ({ ...t, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const isHome = page === 'home';

  const renderPage = (p) => {
    switch(p) {
      case 'home':             return <HomePage />;
      case 'about':            return <AboutPage />;
      case 'locations':        return <LocationsPage />;
      case 'monaco':           return <MonacoPage />;
      case 'flyosc':           return <FlyoscPage />;
      case 'yachting':         return <YachtingPage />;
      case 'yachting-enquiry': return <YachtingEnquiryPage />;
      case 'payment':          return <PaymentPage />;
      case 'confirmation':     return <ConfirmationPage />;
      case 'experiences':      return <ExperiencesPage />;
      case 'yoga':             return <ExperienceDetailPage exp="yoga" />;
      case 'truffle':          return <ExperienceDetailPage exp="truffle" />;
      case 'cooking':          return <ExperienceDetailPage exp="cooking" />;
      case 'wine':             return <ExperienceDetailPage exp="wine" />;
      case 'horses':           return <ExperienceDetailPage exp="horses" />;
      case 'painting':         return <ExperienceDetailPage exp="painting" />;
      case 'wellness':         return <ExperienceDetailPage exp="wellness" />;
      case 'paintball':        return <ExperienceDetailPage exp="paintball" />;
      case 'chef':             return <ExperienceDetailPage exp="chef" />;
      case 'loyalty':          return <LoyaltyPage />;
      case 'contact':          return <ContactPage />;
      case 'signin':           return <SignInPage mode="signin" />;
      case 'login':            return <SignInPage mode="login" />;
      case 'pending-review':   return <PendingReviewPage />;
      case 'privacy':          return <PrivacyPage />;
      case 'cookies':          return <PrivacyPage />;
      default:                 return <HomePage />;
    }
  };

  const opposite = { up:'down', down:'up', left:'right', right:'left' };
  const transitionDuration = '0.85s';
  const transitionEase = 'cubic-bezier(.72,0,.28,1)';

  return (
    <div style={{ background: tweaks.bgColor, minHeight:'100vh', fontFamily:"'" + tweaks.bodyFont + "', sans-serif" }}>
      <NavOverlay open={menuOpen} onClose={() => setMenuOpen(false)} />
      {!isHome && <SiteHeader darkHero={DARK_HERO_PAGES.has(page)} onMenuOpen={() => setMenuOpen(true)} />}
      {isHome && (
        <div style={{ position:'fixed', top:0, right:0, zIndex:50, padding:'22px 40px', display:'flex', alignItems:'center', gap:28 }}>
          <button onClick={() => setMenuOpen(true)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', gap:6, padding:4 }}>
            {[0,1,2].map(i => <span key={i} style={{ display:'block', width:22, height:1, background:'rgba(255,255,255,0.75)' }} />)}
          </button>
        </div>
      )}
      {transitionDir && prevPage ? (
        <div className="mv-page-transition-wrap">
          {/* Outgoing page — slides off in the opposite direction of travel */}
          <div className="mv-page-layer" style={{
            animation: `mv-slide-out-${opposite[transitionDir]} ${transitionDuration} ${transitionEase} forwards`,
            zIndex: 1
          }}>
            {renderPage(prevPage)}
          </div>
          {/* Incoming page — slides in from the direction of travel */}
          <div className="mv-page-layer" style={{
            animation: `mv-slide-in-${transitionDir} ${transitionDuration} ${transitionEase} forwards`,
            zIndex: 2
          }}>
            {renderPage(page)}
          </div>
        </div>
      ) : (
        <PageWrapper pageKey={page}>{renderPage(page)}</PageWrapper>
      )}
      {/* Cookie consent — appears once, persists in localStorage */}
      <CookieBanner />
      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, zIndex:200, background:'#FAF8F5', border:'1px solid #E8E2D9', padding:'24px 28px', width:280, boxShadow:'0 8px 32px rgba(0,0,0,0.12)' }}>
          <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:10, letterSpacing:2.5, textTransform:'uppercase', color:'#B8B0A4', marginBottom:20 }}>Tweaks</p>
          <div style={{ marginBottom:20 }}>
            <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:11, color:'#9A9089', marginBottom:8 }}>Accent Colour</p>
            <div style={{ display:'flex', gap:8 }}>
              {['#7A1F2B','#1A3A4A','#2C4A2C','#3A2C1A','#1F2B5A'].map(c => (
                <div key={c} onClick={() => applyTweak('accentColor', c)} style={{ width:28, height:28, background:c, cursor:'pointer', outline: tweaks.accentColor===c ? '2px solid #111' : 'none', outlineOffset:2 }} />
              ))}
            </div>
          </div>
          <div style={{ marginBottom:20 }}>
            <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:11, color:'#9A9089', marginBottom:8 }}>Background Tone</p>
            <div style={{ display:'flex', gap:8 }}>
              {['#FAF8F5','#F5F2EC','#FDFCFA','#F0EDE6','#FFFEF9'].map(c => (
                <div key={c} onClick={() => applyTweak('bgColor', c)} style={{ width:28, height:28, background:c, cursor:'pointer', border:'1px solid #C8C2BA', outline: tweaks.bgColor===c ? '2px solid #111' : 'none', outlineOffset:2 }} />
              ))}
            </div>
          </div>
          <div style={{ marginBottom:20 }}>
            <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:11, color:'#9A9089', marginBottom:8 }}>Display Font</p>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {['Cormorant Garamond','Playfair Display','Libre Baskerville'].map(f => (
                <div key={f} onClick={() => applyTweak('displayFont', f)} style={{ padding:'6px 10px', border:'1px solid ' + (tweaks.displayFont===f?'#111':'#E8E2D9'), cursor:'pointer', fontFamily:"'" + f + "', serif", fontSize:16 }}>In your way.</div>
              ))}
            </div>
          </div>
          <div>
            <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:11, color:'#9A9089', marginBottom:8 }}>Quick Navigate</p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {[['home','Home'],['locations','Destination'],['yachting','Yachting'],['experiences','Experiences'],['contact','Contact']].map(([p,l]) => (
                <button key={p} onClick={() => window.navigateTo(p)} style={{ padding:'5px 10px', fontSize:10, letterSpacing:1.5, textTransform:'uppercase', fontFamily:'DM Sans, sans-serif', background: page===p ? '#111' : 'transparent', color: page===p ? '#FAF8F5' : '#9A9089', border:'1px solid #E8E2D9', cursor:'pointer' }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
