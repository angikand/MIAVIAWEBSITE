<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&family=Italiana&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; scroll-behavior: smooth; }
    body { background: #FAF8F5; color: #111; font-feature-settings: "kern","liga","calt"; }
    button { font-family: inherit; }
    img { max-width: 100%; }
    /* Recolour native form controls (date picker, checkbox, radio) from
       browser-default blue to the Miavia bordeaux. */
    input, select, textarea { accent-color: #5E1620; }
    input[type="date"], input[type="time"] { color-scheme: light; accent-color: #5E1620; }

    /* — refined scrollbar — */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D8D1C6; border-radius: 3px; transition: background .3s ease; }
    ::-webkit-scrollbar-thumb:hover { background: #B8B0A4; }
    ::selection { background: rgba(122,31,43,0.15); color: #111; }

    /* — typography refinements — */
    h1, h2, h3 { font-feature-settings: "kern","liga","dlig"; }

    /* — reveal-on-scroll — */
    @keyframes mv-fade-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes mv-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes mv-fade-out { from { opacity: 1; } to { opacity: 0; } }
    @keyframes mv-ken-burns { 0% { transform: scale(1.04); } 100% { transform: scale(1.14); } }
    @keyframes mv-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes mv-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes mv-pulse-dot { 0%,100% { opacity: 0.6; transform: scale(1) rotate(45deg); } 50% { opacity: 1; transform: scale(1.2) rotate(45deg); } }
    @keyframes mv-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes mv-slow-zoom { from { transform: scale(1); } to { transform: scale(1.08); } }
    @keyframes mv-reveal-word { from { opacity: 0; transform: translateY(40%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes mv-caret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes mv-drift-x { 0%,100% { transform: translateX(0); } 50% { transform: translateX(4px); } }
    @keyframes mv-border-glow {
      0%,100% { border-color: rgba(255,255,255,0.25); }
      50% { border-color: rgba(255,255,255,0.55); }
    }
    @keyframes mv-spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes mv-fade-up-strong { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes mv-scroll-hint { 0% { transform: translateY(-4px); opacity: 0; } 40% { opacity: 1; } 100% { transform: translateY(10px); opacity: 0; } }

    /* — directional page transitions (Pass 10) — */
    @keyframes mv-slide-in-up    { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    @keyframes mv-slide-in-down  { from { transform: translateY(100%);  } to { transform: translateY(0); } }
    @keyframes mv-slide-in-left  { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes mv-slide-in-right { from { transform: translateX(100%);  } to { transform: translateX(0); } }
    @keyframes mv-slide-out-up    { from { transform: translateY(0); } to { transform: translateY(-100%); } }
    @keyframes mv-slide-out-down  { from { transform: translateY(0); } to { transform: translateY(100%);  } }
    @keyframes mv-slide-out-left  { from { transform: translateX(0); } to { transform: translateX(-100%); } }
    @keyframes mv-slide-out-right { from { transform: translateX(0); } to { transform: translateX(100%);  } }
    .mv-page-transition-wrap { position: relative; width: 100%; min-height: 100vh; overflow: hidden; }
    .mv-page-layer { position: absolute; inset: 0; width: 100%; min-height: 100vh; will-change: transform; }

    /* — utility animation classes — */
    .mv-float { animation: mv-float 4.5s ease-in-out infinite; display: inline-block; will-change: transform; }
    .mv-float-slow { animation: mv-float 7s ease-in-out infinite; display: inline-block; }
    .mv-pulse-dot { animation: mv-pulse-dot 3.6s ease-in-out infinite; }
    .mv-slow-zoom-hero { animation: mv-slow-zoom 18s ease-out both; }
    .mv-border-glow { animation: mv-border-glow 4.5s ease-in-out infinite; }
    .mv-drift-x { animation: mv-drift-x 6s ease-in-out infinite; display: inline-block; }
    .mv-spin-slow { animation: mv-spin-slow 40s linear infinite; display: inline-block; }

    /* — marquee strip — */
    .mv-marquee { overflow: hidden; position: relative; width: 100%; }
    .mv-marquee-track { display: inline-flex; white-space: nowrap; animation: mv-marquee 42s linear infinite; }
    .mv-marquee:hover .mv-marquee-track { animation-play-state: paused; }
    .mv-marquee-item { padding: 0 28px; display: inline-flex; align-items: center; gap: 18px; }

    /* — parallax hero wrapper — */
    .mv-parallax { will-change: transform; transition: transform .1s linear; }

    /* — magnetic button — */
    .mv-magnet { transition: transform .35s cubic-bezier(.2,.6,.2,1); will-change: transform; }

    /* — scroll hint — */
    .mv-scroll-hint { animation: mv-scroll-hint 2.2s ease-in-out infinite; }

    /* — word reveal for split headings — */
    .mv-word-wrap { display: inline-block; overflow: hidden; vertical-align: bottom; padding: 0 .05em; }
    .mv-word { display: inline-block; transform: translateY(100%); opacity: 0; }
    .mv-in .mv-word { animation: mv-reveal-word 1.05s cubic-bezier(.2,.6,.2,1) both; }
    .mv-in .mv-word:nth-child(1) { animation-delay: .05s; }
    .mv-in .mv-word:nth-child(2) { animation-delay: .18s; }
    .mv-in .mv-word:nth-child(3) { animation-delay: .32s; }
    .mv-in .mv-word:nth-child(4) { animation-delay: .46s; }
    .mv-in .mv-word:nth-child(5) { animation-delay: .60s; }
    .mv-in .mv-word:nth-child(6) { animation-delay: .74s; }

    /* — hover tilt cards — */
    .mv-tilt { transition: transform .8s cubic-bezier(.2,.6,.2,1), box-shadow .8s ease; will-change: transform; }
    .mv-tilt:hover { transform: translateY(-6px); box-shadow: 0 24px 60px rgba(12,9,6,0.10); }

    /* — ambient backdrop image behind sections — */
    .mv-ambient { position: absolute; inset: 0; overflow: hidden; }
    .mv-ambient img { width: 100%; height: 100%; object-fit: cover; opacity: .22; filter: saturate(0.85) contrast(0.95); animation: mv-slow-zoom 28s ease-out infinite alternate; }
    .mv-ambient::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(12,9,6,0.75), rgba(12,9,6,0.82)); }

    .mv-reveal { opacity: 0; transform: translateY(22px); transition: opacity 1s cubic-bezier(.2,.6,.2,1), transform 1s cubic-bezier(.2,.6,.2,1); }
    .mv-reveal.mv-in { opacity: 1; transform: translateY(0); }
    .mv-stagger > * { opacity: 0; transform: translateY(16px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.6,.2,1); }
    .mv-stagger.mv-in > *:nth-child(1) { transition-delay: .00s; opacity: 1; transform: translateY(0); }
    .mv-stagger.mv-in > *:nth-child(2) { transition-delay: .10s; opacity: 1; transform: translateY(0); }
    .mv-stagger.mv-in > *:nth-child(3) { transition-delay: .20s; opacity: 1; transform: translateY(0); }
    .mv-stagger.mv-in > *:nth-child(4) { transition-delay: .30s; opacity: 1; transform: translateY(0); }
    .mv-stagger.mv-in > *:nth-child(5) { transition-delay: .40s; opacity: 1; transform: translateY(0); }

    /* — image placeholder hover — */
    .mv-img-zoom { overflow: hidden; position: relative; }
    .mv-img-zoom > * { transition: transform 1.6s cubic-bezier(.2,.6,.2,1), filter 1.2s ease; will-change: transform; }
    .mv-img-zoom:hover > * { transform: scale(1.05); filter: saturate(1.06) brightness(1.02); }

    /* — animated link underline — */
    .mv-underline { position: relative; display: inline-block; }
    .mv-underline::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -3px;
      height: 1px; background: currentColor; transform: scaleX(0); transform-origin: right center;
      transition: transform .6s cubic-bezier(.2,.6,.2,1);
    }
    .mv-underline:hover::after { transform: scaleX(1); transform-origin: left center; }

    /* — ornamental hairline rule with gold dot — */
    .mv-rule { display: inline-flex; align-items: center; gap: 10px; color: #FFFFFF; }
    .mv-rule::before, .mv-rule::after { content: ""; width: 36px; height: 1px; background: currentColor; opacity: .6; }
    .mv-rule-dot { width: 4px; height: 4px; transform: rotate(45deg); background: currentColor; opacity: .9; }

    /* — subtle grain overlay — */
    .mv-grain-after { position: relative; }
    .mv-grain-after::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .04; z-index: 4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }

    /* — video ken burns — */
    .mv-kb { animation: mv-ken-burns 24s ease-in-out infinite alternate; }

    /* — focus ring — */
    :focus-visible { outline: 1px solid #FFFFFF; outline-offset: 3px; }

    /* — text balance on headings — */
    h1, h2, h3, .mv-balance { text-wrap: balance; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    /* ── Mobile (≤768px) — overrides for desktop-first inline styles ───────────
       The site uses inline React style={{...}} extensively, so these rules use
       attribute substring selectors + !important to win specificity. They
       collapse 2/3-column grids to single column, shrink chunky paddings, and
       tighten the header so everything fits on a phone. */
    @media (max-width: 768px) {
      /* Header: tighten padding so logo + menu fit on a phone */
      header[style*="padding: 26px 80px"],
      header[style*="padding: 16px 80px"] {
        padding-left: 22px !important;
        padding-right: 22px !important;
      }

      /* Big section paddings — drop horizontal to 22px, reduce vertical */
      [style*="padding: 120px 40px"]    { padding: 64px 22px !important; }
      [style*="padding: 100px 40px"]    { padding: 56px 22px !important; }
      [style*="padding: 80px 40px"]     { padding: 48px 22px !important; }
      [style*="padding: 64px 40px"]     { padding: 40px 22px !important; }
      [style*="padding: 52px 40px"]     { padding: 36px 22px !important; }
      [style*="padding:120px 40px"]     { padding: 64px 22px !important; }
      [style*="padding:100px 40px"]     { padding: 56px 22px !important; }
      [style*="padding:80px 40px"]      { padding: 48px 22px !important; }
      [style*="padding:64px 40px"]      { padding: 40px 22px !important; }
      [style*="padding:52px 40px"]      { padding: 36px 22px !important; }
      [style*="padding: 120px 40px 100px"] { padding: 64px 22px 56px !important; }
      [style*="padding: 28px 60px"]        { padding: 22px 22px !important; }

      /* Section paddings with bottom-only or asymmetric */
      [style*="padding: 80px 40px 60px"]   { padding: 48px 22px 36px !important; }
      [style*="padding: 60px 40px"]        { padding: 36px 22px !important; }
      [style*="padding: 40px 40px"]        { padding: 28px 22px !important; }

      /* Two-column grids → stack */
      [style*="grid-template-columns: 1fr 1fr"]:not([style*="1fr 1fr 1fr"]):not([style*="1fr 1fr 28px"]) {
        grid-template-columns: 1fr !important;
        gap: 18px !important;
      }
      /* Three-column grids → stack */
      [style*="grid-template-columns: 1fr 1fr 1fr"]:not([style*="1fr 1fr 1fr 28px"]) {
        grid-template-columns: 1fr !important;
        gap: 18px !important;
      }
      /* Four-column grids → 2 columns (e.g. featured experiences) */
      [style*="grid-template-columns: repeat(4"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 16px !important;
      }
      /* Booking experience row: id / date / time / × */
      [style*="grid-template-columns: 1.3fr 1fr 1fr 28px"] {
        grid-template-columns: 1fr !important;
        gap: 14px !important;
      }
      /* Stats strip: repeat(N, 1fr) → 2 columns on mobile */
      [style*="grid-template-columns:repeat("][style*="1fr)"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 28px !important;
      }
      [style*="grid-template-columns: repeat("][style*="1fr)"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 28px !important;
      }

      /* Hero h1 — keep clamp(), but cap minimum so it isn't comically large
         on small screens. JSX uses clamp(52px,7.8vw,104px) etc. — at 7.8vw on
         a 380px screen that's still 30px which is fine, but we trim below. */
      h1[style*="clamp(52px"]   { font-size: clamp(38px, 9.5vw, 64px) !important; }
      h1[style*="clamp(56px"]   { font-size: clamp(40px, 9.5vw, 64px) !important; }
      h2[style*="clamp(32px"]   { font-size: clamp(24px, 7vw, 36px) !important; }
      h2[style*="clamp(28px"]   { font-size: clamp(22px, 6.5vw, 32px) !important; }
      h3[style*="clamp(22px"]   { font-size: clamp(18px, 5.5vw, 26px) !important; }

      /* Reveal containers / max-widths squeeze to viewport */
      [style*="maxWidth: 760px"], [style*="max-width: 760px"],
      [style*="maxWidth: 680px"], [style*="max-width: 680px"],
      [style*="maxWidth: 640px"], [style*="max-width: 640px"],
      [style*="maxWidth: 1280px"], [style*="max-width: 1280px"] {
        max-width: 100% !important;
      }

      /* Footer (meta banner) padding */
      footer[style*="padding: 28px 60px"],
      footer[style*="padding:28px 60px"] {
        padding: 22px 22px !important;
        flex-wrap: wrap !important;
        gap: 12px !important;
        text-align: center !important;
      }

      /* Hide the "Scroll" indicator on mobile (takes too much vertical) */
      .mv-scroll-line { display: none !important; }

      /* Carousel slides: ensure full bleed, tighten internal padding */
      [style*="padding: 0 60px"]      { padding: 0 22px !important; }
      [style*="padding: 0 80px"]      { padding: 0 22px !important; }
      [style*="padding: 0 40px"]      { padding: 0 22px !important; }

      /* Scroll-x carousels (otherExperiences strip) — let them scroll naturally */
      [style*="overflowX: auto"], [style*="overflow-x: auto"] {
        scroll-snap-type: x mandatory !important;
        -webkit-overflow-scrolling: touch !important;
      }

      /* Buttons that span full width on mobile feel friendlier */
      button[style*="padding: 18px 60px"],
      button[style*="padding:18px 60px"] {
        padding: 16px 32px !important;
        width: 100% !important;
        max-width: 320px !important;
      }
    }

    /* Tighter mobile (≤480px) — for older / smaller phones */
    @media (max-width: 480px) {
      [style*="padding: 64px 22px"]   { padding: 48px 18px !important; }
      [style*="padding: 56px 22px"]   { padding: 40px 18px !important; }
      header[style*="padding: 26px 80px"],
      header[style*="padding: 16px 80px"] {
        padding-left: 16px !important;
        padding-right: 16px !important;
      }
    }
  </style>

// `t(key, lang)` looks up a translation. Falls back to English if the
// requested language doesn't have the key. Falls back to the key itself
// if neither language has it (so missing strings show up as `menu.foo`
// and are easy to spot during testing).
function t(key, lang) {
  const code = (lang || 'EN').toLowerCase();
  const dict = T[code] || T.en;
  if (dict[key] != null) return dict[key];
  if (T.en[key] != null) return T.en[key];
  return key;
}

// Helper: read the active language from the various sources, in priority order.
function readActiveLang() {
  if (typeof window === 'undefined') return 'EN';
  // 1. URL hash override (?lang=FR or #lang=FR)
  try {
    const m = (window.location.search + window.location.hash).match(/[?&#]lang=([A-Z]{2})/i);
    if (m) return m[1].toUpperCase();
  } catch (_) {}
  // 2. Clerk profile language (only when signed in)
  try {
    const c = window.Clerk;
    if (c && c.user) {
      const userLang = (c.user.unsafeMetadata && c.user.unsafeMetadata.language) || '';
      const map = { 'English':'EN','Français':'FR','Italiano':'IT','Español':'ES','Deutsch':'DE' };
      if (map[userLang]) return map[userLang];
    }
  } catch (_) {}
  // 3. localStorage
  try {
    const stored = window.localStorage.getItem('miavia-lang');
    if (stored) return stored.toUpperCase();
  } catch (_) {}
  // 4. Default
  return 'EN';
}

// `useLanguage()` is the per-component hook. Returns { lang, setLang, t }.
// All components that use this re-render whenever any one of them calls
// setLang() — they're synchronised via a window event.
function useLanguage() {
  const [lang, setLangState] = React.useState(() => readActiveLang());
  React.useEffect(() => {
    const update = () => setLangState(readActiveLang());
    window.addEventListener('miavia-lang-changed', update);
    window.addEventListener('miavia-clerk-changed', update); // re-read when user signs in
    return () => {
      window.removeEventListener('miavia-lang-changed', update);
      window.removeEventListener('miavia-clerk-changed', update);
    };
  }, []);
  const setLang = React.useCallback((newLang) => {
    const code = (newLang || 'EN').toUpperCase();
    try { window.localStorage.setItem('miavia-lang', code); } catch (_) {}
    // If signed in, also persist to Clerk profile so it follows the user.
    try {
      if (window.Clerk && window.Clerk.user) {
        const map = { 'EN':'English','FR':'Français','IT':'Italiano','ES':'Español','DE':'Deutsch' };
        const labelled = map[code] || 'English';
        const meta = (window.Clerk.user.unsafeMetadata || {});
        if (meta.language !== labelled) {
          window.Clerk.user.update({
            unsafeMetadata: { ...meta, language: labelled }
          }).catch(()=>{});
        }
      }
    } catch (_) {}
    window.dispatchEvent(new Event('miavia-lang-changed'));
  }, []);
  return { lang, setLang, t: (key) => t(key, lang) };
}

// ─── CLERK AUTH HOOKS ────────────────────────────────────────────────────
// `useClerkUser()` gives every component live access to the signed-in user
// (or `null`). Re-renders any time auth state changes.
// Membership-status helper. A user is `approved` when their Clerk metadata
// has `membershipStatus === 'approved'` (set by the boss in the dashboard).
// Anyone without that flag — including pre-approval-flow legacy members —
// is treated as pending. To grandfather an existing user, set their
// unsafeMetadata.membershipStatus to 'approved' in the Clerk dashboard.
function membershipStatusOf(user) {
  if (!user) return 'guest';
  const meta = (user.unsafeMetadata || {});
  const pub  = (user.publicMetadata || {});
  return meta.membershipStatus || pub.membershipStatus || 'pending';
}

function useClerkUser() {
  const [state, setState] = React.useState(() => {
    const c = (typeof window !== 'undefined') ? window.Clerk : null;
    const u = c && c.user || null;
    const status = membershipStatusOf(u);
    return {
      isLoaded: !!(c && c.loaded),
      isSignedIn: !!(c && c.user),
      isApproved: status === 'approved',
      membershipStatus: u ? status : 'guest',
      user: u,
    };
  });
  React.useEffect(() => {
    const update = () => {
      const c = window.Clerk;
      const u = c && c.user || null;
      const status = membershipStatusOf(u);
      setState({
        isLoaded: !!(c && c.loaded),
        isSignedIn: !!(c && c.user),
        isApproved: status === 'approved',
        membershipStatus: u ? status : 'guest',
        user: u,
      });
    };
    window.addEventListener('miavia-clerk-ready', update);
    window.addEventListener('miavia-clerk-changed', update);
    // Also check immediately in case Clerk loaded before this hook mounted.
    if (window.Clerk && window.Clerk.loaded) update();
    return () => {
      window.removeEventListener('miavia-clerk-ready', update);
      window.removeEventListener('miavia-clerk-changed', update);
    };
  }, []);
  return state;
}

// Friendly imperative helpers used across the app. Each pulls in the
// Miavia-themed appearance so every modal/inline form looks consistent.
const MIAVIA_CLERK_APPEARANCE = (typeof window !== 'undefined' && window.MIAVIA_CLERK_APPEARANCE) || {};
function openSignIn(opts = {}) {
  if (window.Clerk && window.Clerk.loaded) {
    window.Clerk.openSignIn({ appearance: MIAVIA_CLERK_APPEARANCE, ...opts });
  } else window.alert('Authentication is still loading — please try again in a moment.');
}
function openSignUp(opts = {}) {
  // Always route Sign Up through the full custom form (boss spec —
  // collects 7 fields). Clerk's lightweight modal is reserved for sign-in.
  if (typeof window !== 'undefined' && window.navigateTo) {
    window.navigateTo('signin'); // 'signin' route is the signup page
  } else if (window.Clerk && window.Clerk.loaded) {
    window.Clerk.openSignUp({ appearance: MIAVIA_CLERK_APPEARANCE, ...opts });
  }
}
function clerkSignOut() {
  if (window.Clerk) window.Clerk.signOut();
}

// Pull a normalised guest profile out of a Clerk user object — used to
// pre-fill booking forms.
function profileFromClerk(user) {
  if (!user) return {};
  const phone = (user.primaryPhoneNumber && user.primaryPhoneNumber.phoneNumber) || '';
  const email = (user.primaryEmailAddress && user.primaryEmailAddress.emailAddress) || '';
  return {
    firstName: user.firstName || '',
    lastName:  user.lastName  || '',
    email,
    phone,
    birthday: (user.unsafeMetadata && user.unsafeMetadata.birthday) || '',
    language: (user.unsafeMetadata && user.unsafeMetadata.language) || 'English',
  };
}

          onMouseEnter={e=>{ e.currentTarget.style.background='#111'; e.currentTarget.style.color='#FAF8F5'; }}
          onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#111'; }}>
          Become a Member
        </button>
      </div>
    </div>
  );
}

function pickScenePhoto(label) {
  if (!label) return null;
  const l = label.toLowerCase();
  // Longest matching key wins
  const keys = Object.keys(SCENE_PHOTOS).sort((a,b) => b.length - a.length);
  for (const k of keys) {
    if (l.includes(k)) return SCENE_PHOTOS[k];
  }
  return SCENE_FALLBACK;
}

// ── Image Placeholder (now renders real photos when available) ────────────
// Supports URL cascade: pass an array and it tries each until one loads.
function ImgPlaceholder({ label, src, style = {}, className = '', onClick }) {
  const resolved = src !== undefined ? src : pickScenePhoto(label);
  // Normalise to array for cascade fallback
  const urls = React.useMemo(() => {
    if (!resolved) return [];
    return Array.isArray(resolved) ? resolved.filter(Boolean) : [resolved];
  }, [resolved]);
  const [idx, setIdx] = React.useState(0);
  const [broken, setBroken] = React.useState(false);
  React.useEffect(() => { setIdx(0); setBroken(false); }, [urls.join('|')]);
  const current = urls[idx];
  const showPhoto = !!current && !broken;
  return (
    <div className={className} onClick={onClick} style={{
      background: 'linear-gradient(135deg,#F5F1EB 0%,#EDE8E0 50%,#E8DFD3 100%)',
      display:'flex', alignItems:'center', justifyContent:'center',
      overflow:'hidden', position:'relative', ...style
    }}>
      {showPhoto && (
        <img src={current} alt={label || ''}
          onError={() => {
            if (idx + 1 < urls.length) { setIdx(idx + 1); }
            else { setBroken(true); }
          }}
          style={{ position:'absolute', inset:0, width:'100%', height:'100%',
            objectFit:'cover', objectPosition:'center center', display:'block' }} />
      )}
      {!showPhoto && (
        <>
          {/* Soft radial warmth */}
          <div style={{ position:'absolute', inset:0,
            background:'radial-gradient(ellipse at 30% 20%, rgba(255,249,235,0.55) 0%, rgba(255,255,255,0.08) 40%, transparent 70%)',
            pointerEvents:'none' }} />
          {/* Hairline frame */}
          <div style={{ position:'absolute', inset:14, border:'1px solid rgba(255,255,255,0.18)',
            pointerEvents:'none' }} />
          {/* Centered italic label with ornament */}
          <div style={{ position:'relative', zIndex:1, textAlign:'center',
            padding:'8px 20px', maxWidth:260 }}>
            <span style={{ display:'inline-block', width:24, height:1,
              background:'#FFFFFF', opacity:0.55, marginBottom:10 }} />
            <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
              fontWeight:300, fontSize:13, color:'#A89880', lineHeight:1.55,
              letterSpacing:0.2 }}>
              {label}
            </p>
          </div>
        </>
      )}
    </div>
  );
}

// ── Video Background ───────────────────────────────────────────────────────
function VideoBg({ label, src, video, poster, mediaOpacity, children }) {
  // If a real URL is passed (either as `src` or embedded in `label`), use it
  // directly instead of going through the keyword matcher — otherwise every
  // property-page hero resolves to the same fallback image. If `video` is
  // also passed, an autoplay/looped silent video plays on top of the image,
  // with the image acting as a poster + fallback.
  const isImgUrl = (s) => typeof s === 'string' && (
    s.startsWith('./') || s.startsWith('/') ||
    s.startsWith('http://') || s.startsWith('https://') ||
    /\.(jpe?g|png|webp|gif|avif)(\?.*)?$/i.test(s)
  );
  const isVideoUrl = (s) => typeof s === 'string' &&
    /\.(mp4|webm|mov)(\?.*)?$/i.test(s);
  // Detect a video either in `video` or by sniffing `src`/`label`.
  const videoUrl = (video && isVideoUrl(video)) ? video
                 : (src && isVideoUrl(src))     ? src
                 : (isVideoUrl(label))          ? label
                 : null;
  const photoUrl = (poster && isImgUrl(poster)) ? poster
                 : (src && isImgUrl(src))       ? src
                 : (isImgUrl(label))            ? label
                 : pickScenePhoto(label);
  const captionText = isImgUrl(label) || isVideoUrl(label) ? '' : label;
  const [imgOk, setImgOk] = React.useState(!!photoUrl);
  return (
    <div style={{ position:'relative', width:'100%', height:'100%', overflow:'hidden' }}>
      {/* Hero photo backdrop — graceful fallback to gradient if broken.
          Always renders, even when a video is present, so the page has
          something on screen during the ~1s before the video buffers. */}
      {photoUrl && imgOk && (
        <img src={photoUrl} alt="" onError={()=>setImgOk(false)}
          className="mv-slow-zoom-hero"
          style={{ position:'absolute', inset:'-4%', width:'108%', height:'108%',
            objectFit:'cover',
            opacity: mediaOpacity != null ? mediaOpacity : 0.55,
            filter:'saturate(0.92) contrast(0.98) brightness(0.9)' }} />
      )}
      {/* Hero video — autoplay silent loop, layered above the photo. When
          a video is present, opacity is opened up (0.92 by default) so the
          footage reads clearly through the overlays above. */}
      {videoUrl && (
        <video src={videoUrl}
          autoPlay muted loop playsInline
          poster={photoUrl || undefined}
          onError={(e)=>{ e.currentTarget.style.display='none'; }}
          style={{ position:'absolute', inset:'-4%', width:'108%', height:'108%',
            objectFit:'cover',
            opacity: mediaOpacity != null ? mediaOpacity : 0.85,
            filter:'saturate(0.95) contrast(0.98) brightness(0.95)' }} />
      )}
      {/* Base cinematic gradient — ken-burns motion. Lightened when a video
          is present so the footage reads through. */}
      <div className="mv-kb" style={{ position:'absolute', inset:'-6%',
        background: videoUrl
          ? 'radial-gradient(ellipse at 30% 40%, rgba(42,31,22,0.28) 0%, rgba(28,22,16,0.42) 45%, rgba(12,9,6,0.55) 100%)'
          : 'radial-gradient(ellipse at 30% 40%, rgba(42,31,22,0.7) 0%, rgba(28,22,16,0.85) 45%, rgba(12,9,6,0.95) 100%)',
        mixBlendMode:'multiply' }} />
      {/* Warm golden glow */}
      <div style={{ position:'absolute', inset:0,
        background:'radial-gradient(ellipse at 75% 30%, rgba(255,255,255,0.10) 0%, transparent 55%)' }} />
      {/* Deep burgundy wash — softer when video plays */}
      <div style={{ position:'absolute', inset:0,
        background: videoUrl
          ? 'radial-gradient(ellipse at 20% 85%, rgba(122,31,43,0.10) 0%, transparent 50%)'
          : 'radial-gradient(ellipse at 20% 85%, rgba(122,31,43,0.18) 0%, transparent 50%)' }} />
      {/* Subtle scanlines */}
      <div style={{ position:'absolute', inset:0,
        background:'repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(255,255,255,0.008) 3px,rgba(255,255,255,0.008) 4px)' }} />
      {/* Top + bottom vignette — kept light so titles still read */}
      <div style={{ position:'absolute', inset:0,
        background: videoUrl
          ? 'linear-gradient(to bottom,rgba(0,0,0,0.18) 0%,rgba(0,0,0,0.0) 35%,rgba(0,0,0,0.05) 65%,rgba(0,0,0,0.35) 100%)'
          : 'linear-gradient(to bottom,rgba(0,0,0,0.35) 0%,rgba(0,0,0,0.0) 35%,rgba(0,0,0,0.08) 65%,rgba(0,0,0,0.65) 100%)' }} />
      {/* Grain */}
      <div style={{ position:'absolute', inset:0, opacity:0.06, mixBlendMode:'overlay',
        backgroundImage:'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 256 256\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'n\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.9\' numOctaves=\'4\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23n)\'/%3E%3C/svg%3E")' }} />
      {/* Discreet italic caption — suppressed when label is just a URL */}
      {captionText && (
        <span style={{ position:'absolute', bottom:28, right:40,
          fontFamily:'Cormorant Garamond, serif', fontStyle:'italic', fontWeight:300,
          fontSize:11, color:'rgba(255,255,255,0.28)', letterSpacing:0.4 }}>
          — {captionText}
        </span>
      )}
      <div style={{ position:'relative', zIndex:1, height:'100%' }}>{children}</div>
    </div>
  );
}

// ── Intersection Reveal (fade-up on scroll) ────────────────────────────────
function Reveal({ children, className='', delay=0, stagger=false, style={} }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if(!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if(e.isIntersecting){ el.classList.add('mv-in'); io.unobserve(el); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    io.observe(el); return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} className={(stagger?'mv-stagger ':'mv-reveal ')+className}
      style={{ transitionDelay: delay ? `${delay}ms` : undefined, ...style }}>
      {children}
    </div>
  );
}

// ── Animated Counter (counts up on scroll into view) ───────────────────────
function AnimatedCounter({ to, duration=1400, suffix='', style={} }) {
  const [val, setVal] = React.useState(0);
  const ref = React.useRef(null);
  const numericTo = Number(String(to).replace(/[^0-9.]/g, '')) || 0;
  const textFallback = String(to);
  const isNumeric = /^\d+(\.\d+)?$/.test(String(to).trim());
  React.useEffect(() => {
    const el = ref.current; if(!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          io.unobserve(el);
          if (!isNumeric) return;
          const start = performance.now();
          const ease = (t) => 1 - Math.pow(1-t, 3);
          const step = (now) => {
            const p = Math.min(1, (now - start) / duration);
            setVal(Math.round(numericTo * ease(p)));
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        }
      });
    }, { threshold: 0.3 });
    io.observe(el); return () => io.disconnect();
  }, [numericTo, duration, isNumeric]);
  return (
    <span ref={ref} style={style}>
      {isNumeric ? val : textFallback}{suffix}
    </span>
  );
}

// ── Split Words (for mv-word reveal animation) ────────────────────────────
function SplitWords({ text, style={} }) {
  const words = String(text).split(/(\s+)/);

        <span key={i} className="mv-word-wrap"><span className="mv-word">{w}</span></span>
      ))}
    </span>
  );
}

  const isLight = light || tone === 'white';
  const widths = { xs:72, sm:96, md:140, lg:220, xl:320 };
  const sizes = { xs:18, sm:22, md:30, lg:44, xl:62 };

  const w = widths[size] || 140;
  const fs = sizes[size] || 30;
  const color = isLight ? '#FFFFFF' : '#7A1F2B';
  const src = isLight ? 'miavia-logo-white.png' : 'miavia-logo.png';
  if (fallback) {
    return (
      <div onClick={() => window.navigateTo('home')}
        style={{ width:w, cursor:'pointer', userSelect:'none', display:'inline-block' }}>
        <div style={{ fontFamily:'Italiana, serif', fontSize:fs,
          letterSpacing:'0.18em', textAlign:'center',
          color, lineHeight:1, textTransform:'lowercase' }}>
          miavia

          justifyContent:'center', gap:6 }}>
          <span style={{ height:1, width:16, background:'#FFFFFF', opacity:0.55 }} />
          <span style={{ width:3, height:3, transform:'rotate(45deg)',
            background:'#FFFFFF', opacity:0.75 }} />
          <span style={{ height:1, width:16, background:'#FFFFFF', opacity:0.55 }} />
        </div>
      </div>

  }
  return (
    <img src={src} alt="miavia"

      style={{ width:w, height:'auto', display:'block', cursor:'pointer',
        filter: isLight ? 'drop-shadow(0 2px 16px rgba(0,0,0,0.35))' : 'none' }}
      onClick={() => window.navigateTo('home')} />
  );
}

// ── Primary Button ─────────────────────────────────────────────────────────
function BtnPrimary({ children, onClick, style={} }) {
  const [hov, setHov] = React.useState(false);
  const ref = React.useRef(null);
  const onMove = (e) => {
    const b = ref.current?.getBoundingClientRect();
    if (!b) return;
    const mx = e.clientX - (b.left + b.width/2);
    const my = e.clientY - (b.top + b.height/2);
    ref.current.style.transform = `translate(${mx*0.12}px, ${my*0.18}px)`;
  };
  const onLeave = () => {
    setHov(false);
    if (ref.current) ref.current.style.transform = 'translate(0,0)';
  };
  return (
    <button ref={ref} onClick={onClick} className="mv-magnet"
      onMouseEnter={()=>setHov(true)} onMouseMove={onMove} onMouseLeave={onLeave}
      style={{
        position:'relative', overflow:'hidden',
        background:'transparent',
        color: hov ? '#FAF8F5' : '#111',
        border:'1px solid #111', padding:'16px 48px',
        fontSize:10.5, letterSpacing:3, textTransform:'uppercase',
        fontFamily:'DM Sans, sans-serif', fontWeight:400, cursor:'pointer',
        transition:'color 0.6s ease, border-color 0.6s ease, transform .35s cubic-bezier(.2,.6,.2,1)',
        borderColor: hov ? '#7A1F2B' : '#111',
        ...style
      }}>
      <span style={{ position:'absolute', inset:0,
        background:'#7A1F2B',
        transform: hov ? 'translateY(0)' : 'translateY(101%)',
        transition:'transform 0.6s cubic-bezier(.2,.6,.2,1)', zIndex:0 }} />
      <span style={{ position:'relative', zIndex:1, display:'inline-flex', alignItems:'center', gap:10 }}>
        {children}
        <span style={{ display:'inline-block', transform: hov ? 'translateX(6px)' : 'translateX(0)',
          transition:'transform .55s cubic-bezier(.2,.6,.2,1)', opacity: hov ? 1 : 0.7 }}>→</span>
      </span>
    </button>
  );
}

    <button onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        position:'relative', overflow:'hidden', background:'transparent',
        color: hov ? '#0C0906' : 'rgba(255,255,255,0.88)',
        border:`1px solid ${hov ? '#FFFFFF' : 'rgba(255,255,255,0.4)'}`,

        transition:'color 0.6s ease, border-color 0.6s ease', ...style
      }}>
      <span style={{ position:'absolute', inset:0, background:'#FFFFFF',
        transform: hov ? 'translateY(0)' : 'translateY(-101%)',
        transition:'transform 0.6s cubic-bezier(.2,.6,.2,1)', zIndex:0 }} />
      <span style={{ position:'relative', zIndex:1 }}>{children}</span>
    </button>
  );
}

// ── Text Link Button ───────────────────────────────────────────────────────

      ? [{label: t('menu.profile'), action:()=>{ if (window.Clerk) window.Clerk.openUserProfile(); }}]
      : [{label: t('menu.signup'), action:openSignUp},

      }}>

           onMouseLeave={e=>{e.currentTarget.style.color='#B8B0A4'; e.currentTarget.style.transform='rotate(0)';}}>✕</button>

// ── Site Header ────────────────────────────────────────────────────────────
function SiteHeader({ darkHero=false, onMenuOpen }) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn);
    fn();
    return () => window.removeEventListener('scroll', fn);
  }, []);
  // Quiet-luxury architecture: burgundy-filled header once scrolled
  // (or whenever we're over a dark hero), with the white wordmark. Over a
  // light hero pre-scroll we sit transparent so the photography breathes.
  const onBurgundy = scrolled || darkHero;
  const [menuHov, setMenuHov] = React.useState(false);
  const { isSignedIn, user } = useClerkUser();
  const { t } = useLanguage();
  const userBtnRef = React.useRef(null);
  // Mount Clerk's UserButton (avatar + dropdown with profile + sign out)
  // when signed in. It re-mounts whenever auth state changes.
  React.useEffect(() => {
    if (!isSignedIn || !userBtnRef.current || !window.Clerk) return;
    window.Clerk.mountUserButton(userBtnRef.current, {
      appearance: MIAVIA_CLERK_APPEARANCE,
      afterSignOutUrl: '/'
    });
    return () => { try { window.Clerk.unmountUserButton(userBtnRef.current); } catch (_) {} };
  }, [isSignedIn]);

  return (
    <header style={{
      position:'fixed', top:0, left:0, right:0, zIndex:50,
      padding: scrolled ? '16px 80px' : '26px 80px',
      display:'flex', alignItems:'center', justifyContent:'space-between',
      background: scrolled
        ? 'rgba(94,22,32,0.96)'
        : (darkHero ? 'transparent' : 'rgba(250,248,245,0.0)'),
      backdropFilter: scrolled ? 'saturate(1.1) blur(14px)' : 'none',
      WebkitBackdropFilter: scrolled ? 'saturate(1.1) blur(14px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.25)' : '1px solid transparent',
      boxShadow: scrolled ? '0 14px 40px -20px rgba(12,9,6,0.35)' : 'none',
      transition:'all 0.55s cubic-bezier(.2,.6,.2,1)'
    }}>
      <Logo size="sm" tone={onBurgundy ? 'white' : 'burgundy'} />
      <div style={{ display:'flex', alignItems:'center', gap:24 }}>
        {isSignedIn ? (
          <div ref={userBtnRef} />
        ) : (
          <button onClick={()=>openSignIn()} style={{
            background:'none', border:'none', cursor:'pointer',
            fontSize:10.5, letterSpacing:2.4, textTransform:'uppercase',
            color: onBurgundy ? 'rgba(255,255,255,0.92)' : '#0C0906',
            fontFamily:'DM Sans, sans-serif', padding:'6px 10px',
            transition:'opacity 0.3s ease'
          }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.7'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            {t('menu.signin')}
          </button>
        )}
        <button onClick={onMenuOpen}
          onMouseEnter={()=>setMenuHov(true)} onMouseLeave={()=>setMenuHov(false)}
          style={{
            background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', gap:6, padding:6
          }}>
          {[0,1,2].map(i=>(
            <span key={i} style={{
              display:'block',
              width: menuHov ? (i===1?28:22) : (i===1?18:22), height:1,
              background: onBurgundy ? 'rgba(255,255,255,0.92)' : '#0C0906',
              transition:'width 0.45s cubic-bezier(.2,.6,.2,1), background 0.4s ease',
              alignSelf: i===1 ? 'flex-end' : 'flex-start'
            }} />
          ))}
        </button>
      </div>
    </header>
  );
}

// ── Simple Carousel ────────────────────────────────────────────────────────
function SimpleCarousel({ items, height=420, autoMs=6000 }) {
  const [idx, setIdx] = React.useState(0);
  const [fade, setFade] = React.useState(true);
  const [paused, setPaused] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const go = (n) => {
    setFade(false);
    setTimeout(()=>{ setIdx((idx+n+items.length)%items.length); setFade(true); setProgress(0); }, 280);
  };
  React.useEffect(() => {
    if (paused || !autoMs) return;
    const tick = 60;
    const step = (tick / autoMs) * 100;
    const id = setInterval(() => {
      setProgress(p => {
        if (p + step >= 100) {
          setFade(false);
          setTimeout(()=>{ setIdx(i => (i+1)%items.length); setFade(true); }, 280);
          return 0;
        }
        return p + step;
      });
    }, tick);
    return () => clearInterval(id);
  }, [paused, autoMs, items.length]);
  const btn = {
    position:'absolute', top:'50%', transform:'translateY(-50%)',
    background:'rgba(12,9,6,0.25)', backdropFilter:'blur(10px)',
    WebkitBackdropFilter:'blur(10px)',
    border:'1px solid rgba(255,255,255,0.22)', color:'#FAF8F5',
    width:44, height:44, cursor:'pointer',
    display:'flex', alignItems:'center', justifyContent:'center',
    transition:'background 0.4s ease, border-color 0.4s ease'
  };
  // Items can be either descriptive labels (matched via SCENE_PHOTOS keywords)
  // OR direct image URLs. Detect URLs so carousels with real photography
  // pass the path as src instead of label — otherwise EVERY slide would
  // resolve to the same fallback image via the keyword-matcher.
  const isUrl = (s) => typeof s === 'string' && (
    s.startsWith('./') || s.startsWith('/') ||
    s.startsWith('http://') || s.startsWith('https://') ||
    /\.(jpe?g|png|webp|gif|avif)(\?.*)?$/i.test(s)
  );
  const current = items[idx];
  return (
    <div style={{ position:'relative', height, overflow:'hidden' }}
      onMouseEnter={()=>setPaused(true)} onMouseLeave={()=>setPaused(false)}>
      <div style={{
        opacity: fade?1:0,
        transform: fade ? 'scale(1)' : 'scale(1.015)',
        transition:'opacity 0.7s cubic-bezier(.2,.6,.2,1), transform 0.7s cubic-bezier(.2,.6,.2,1)',
        height:'100%' }}>
        <ImgPlaceholder
          src={isUrl(current) ? current : undefined}
          label={isUrl(current) ? '' : current}
          className="mv-img-zoom" style={{ width:'100%', height:'100%' }} />
      </div>
      {/* Progress bar */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2,
        background:'rgba(255,255,255,0.12)', zIndex:3 }}>
        <div style={{ height:'100%', width: progress+'%',
          background:'#FFFFFF', transition:'width 60ms linear' }} />
      </div>
      {/* Gradient overlay for controls */}
      <div style={{ position:'absolute', inset:0, pointerEvents:'none',
        background:'linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.35) 100%)' }} />
      <button onClick={()=>go(-1)} style={{ ...btn, left:20 }}
        onMouseEnter={e=>{e.currentTarget.style.background='rgba(122,31,43,0.85)'; e.currentTarget.style.borderColor='#FFFFFF';}}
        onMouseLeave={e=>{e.currentTarget.style.background='rgba(12,9,6,0.25)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.22)';}}>
        <Chevron dir="left" size={14} color="#FAF8F5"/>
      </button>
      <button onClick={()=>go(1)} style={{ ...btn, right:20 }}
        onMouseEnter={e=>{e.currentTarget.style.background='rgba(122,31,43,0.85)'; e.currentTarget.style.borderColor='#FFFFFF';}}
        onMouseLeave={e=>{e.currentTarget.style.background='rgba(12,9,6,0.25)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.22)';}}>
        <Chevron dir="right" size={14} color="#FAF8F5"/>
      </button>
      {/* Indicators */}
      <div style={{ position:'absolute', bottom:22, left:0, right:0,
        display:'flex', justifyContent:'center', gap:10 }}>
        {items.map((_,i)=>(
          <span key={i} onClick={()=>setIdx(i)} style={{
            width: i===idx ? 32 : 10, height:1.5,
            background: i===idx ? '#FFFFFF' : 'rgba(255,255,255,0.35)',
            cursor:'pointer', transition:'all 0.5s cubic-bezier(.2,.6,.2,1)'
          }}/>
        ))}
      </div>
    </div>
  );
}

// ── Experience Carousel (cards — image + label + discover link) ──────────
// One card visible at a time on narrow screens; up to 3 side-by-side on wide.
// Prev / next arrows, dot indicators, auto-advance, quiet editorial styling.
function ExperienceCarousel({ items, photos, fallback='experiences', autoMs=6500, height=560 }) {
  const safe = React.useMemo(() => (items || []).filter(Boolean), [items]);
  const [idx, setIdx] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [visible, setVisible] = React.useState(3);

  // Responsive card count (3 desktop / 2 tablet / 1 mobile)
  React.useEffect(() => {
    const update = () => {
      const w = typeof window !== 'undefined' ? window.innerWidth : 1200;
      setVisible(w < 700 ? 1 : w < 1080 ? 2 : 3);
    };
    update();
    if (typeof window !== 'undefined') {
      window.addEventListener('resize', update);
      return () => window.removeEventListener('resize', update);
    }
  }, []);

  const count = safe.length;
  const pageCount = Math.max(1, count - visible + 1);
  const clamp = (n) => ((n % pageCount) + pageCount) % pageCount;
  const go = (n) => { setIdx(i => clamp(i + n)); setProgress(0); };

  // Auto-advance
  React.useEffect(() => {
    if (paused || !autoMs || pageCount <= 1) return;
    const tick = 60;
    const step = (tick / autoMs) * 100;
    const id = setInterval(() => {
      setProgress(p => {
        if (p + step >= 100) {
          setIdx(i => clamp(i + 1));
          return 0;
        }
        return p + step;
      });
    }, tick);
    return () => clearInterval(id);
  }, [paused, autoMs, pageCount]);

  // Which expIds have real detail pages (fallback to 'experiences' otherwise)
  const DETAIL_PAGES = {yoga:1,truffle:1,cooking:1,wine:1,horses:1,painting:1,wellness:1,paintball:1,chef:1};
  const click = (expId) => {
    if (typeof window === 'undefined' || !window.navigateTo) return;
    window.navigateTo(DETAIL_PAGES[expId] ? expId : fallback);
  };

  if (!count) return null;

  const cardWidthPct = 100 / visible;
  const offsetPct = idx * cardWidthPct;

  const arrow = {
    width:44, height:44, borderRadius:'50%',
    border:'1px solid rgba(17,17,17,0.18)', background:'rgba(250,248,245,0.95)',
    color:'#111', cursor:'pointer',
    display:'flex', alignItems:'center', justifyContent:'center',
    transition:'background 0.35s ease, border-color 0.35s ease, color 0.35s ease'
  };

  return (
    <div
      style={{ position:'relative', maxWidth:1320, margin:'0 auto' }}
      onMouseEnter={()=>setPaused(true)}
      onMouseLeave={()=>setPaused(false)}
    >
      {/* Track */}
      <div style={{ overflow:'hidden' }}>
        <div style={{
          display:'flex',
          transform:`translateX(-${offsetPct}%)`,
          transition:'transform 0.85s cubic-bezier(.2,.6,.2,1)'
        }}>
          {safe.map(expId => (
            <div key={expId}
              style={{ flex:`0 0 ${cardWidthPct}%`, padding:'0 6px', boxSizing:'border-box' }}>
              <div className="mv-img-zoom"
                style={{ cursor:'pointer', background:'#FAF8F5' }}
                onClick={()=>click(expId)}>
                <ImgPlaceholder
                  src={photos && photos[expId]}
                  label={`${EXP_LABELS[expId]||expId} experience, editorial`}
                  style={{ width:'100%', aspectRatio:'3/4' }} />
                <div style={{ padding:'26px 22px 30px', background:'#FAF8F5' }}>
                  <p style={{ fontFamily:'Cormorant Garamond, serif', fontSize:22,
                    fontWeight:300, color:'#111', marginBottom:12,
                    letterSpacing:'-0.005em' }}>
                    {EXP_LABELS[expId]||expId}
                  </p>
                  <BtnLink style={{ fontSize:9 }}>Discover</BtnLink>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Nav arrows (hidden if everything fits) */}
      {pageCount > 1 && (

// ── Directional Nav Item ───────────────────────────────────────────────────
function DirNav({ dir, label, page, style={} }) {
  const [hov, setHov] = React.useState(false);
  const isVert = dir==='up'||dir==='down';
  const flex = { up:'column-reverse', down:'column', left:'row-reverse', right:'row' }[dir];
  const shift = hov
    ? ({up:'translateY(-6px)',down:'translateY(6px)',left:'translateX(-6px)',right:'translateX(6px)'}[dir])
    : 'none';
  const lineOrient = isVert
    ? { width:1, height:28 }
    : { width:28, height:1 };
  return (
    <button
      onClick={()=>window.navigateTo(page, dir)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        background:'none', border:'none', cursor:'pointer',
        display:'flex', flexDirection:flex, alignItems:'center',
        gap: isVert ? 14 : 18,
        color: hov ? '#FFFFFF' : 'rgba(255,255,255,0.65)',
        transition:'color 0.5s ease', ...style
      }}>
      <span style={{ fontSize:10, letterSpacing:3.2, textTransform:'uppercase',
        fontFamily:'DM Sans, sans-serif', fontWeight:400, whiteSpace:'nowrap' }}>
        {label}
      </span>
      <span style={{
        ...lineOrient,
        background:'currentColor', opacity: hov ? 0.85 : 0.35,
        transition:'opacity 0.5s ease, transform 0.55s cubic-bezier(.2,.6,.2,1)',
        transform: hov
          ? (isVert ? (dir==='up'?'scaleY(1.4)':'scaleY(1.4)') : (dir==='left'?'scaleX(1.4)':'scaleX(1.4)'))
          : 'scale(1)',
        transformOrigin: {up:'bottom center',down:'top center',left:'right center',right:'left center'}[dir]
      }} />
      <span style={{ transform:shift, transition:'transform 0.55s cubic-bezier(.2,.6,.2,1)', display:'flex' }}>
        <Chevron dir={dir} size={16} color="currentColor" />
      </span>
    </button>
  );
}

                    color:'#5A534C', lineHeight:1.85, marginBottom:40, maxWidth:420,
                    fontWeight:300 }}>
                    {loc.desc}
                  </p>
                  <BtnPrimary onClick={()=>window.navigateTo(loc.id)}>
                    {t('property.discover')}
                  </BtnPrimary>
                </div>
              </div>
            </Reveal>
          );
        })}
      </div>
      <SiteFooter />
    </div>
  );
}

  yoga:      { amount: 150, perPerson: true,  label: '€150 / person' },

  truffle:   { amount: 450, perPerson: false, label: '€450 / group' },

// ── Property Booking Form ─────────────────────────────────────────────────
// Members-only — gated by Clerk. Pre-fills from the signed-in user's
// Clerk profile. Destination dropdown, guests, stay dates, per-experience
// date pickers, additional details.
function PropertyBookingForm({ data }) {
  const { isLoaded, isSignedIn, isApproved, user } = useClerkUser();
  const { t } = useLanguage();
  const u = profileFromClerk(user);
  const initial = {
    firstName: u.firstName || '',
    lastName:  u.lastName  || '',
    email:     u.email     || '',
    phone:     u.phone     || '',
    birthday:  u.birthday  || '',
    language:  u.language  || 'English',
    // Property pages start with their own destination preselected, but
    // restrict to flyosc/yachting only (boss spec — Suite removed).
    destination: (data.key === 'flyosc' || data.key === 'yachting') ? data.key : '',
    guests: '',
    dateMode: 'multiple-days',
    checkIn: '',
    checkOut: '',
    experiences: [{ id:'', subtype:'', date:'', time:'' }],
    notes: ''
  };
  const [form, setForm] = React.useState(initial);
  // Re-pull from Clerk once auth resolves.
  React.useEffect(() => {
    if (!isSignedIn) return;
    setForm(f => ({
      ...f,
      firstName: f.firstName || u.firstName,
      lastName:  f.lastName  || u.lastName,
      email:     f.email     || u.email,
      phone:     f.phone     || u.phone,
      birthday:  f.birthday  || u.birthday,
      language:  f.language  || u.language,
    }));
  }, [isSignedIn, u.firstName, u.lastName, u.email, u.phone]);
  const set = (k,v) => setForm(f=>({ ...f, [k]:v }));
  const setExp = (i, k, v) => setForm(f=>{
    const list = f.experiences.slice();
    list[i] = { ...list[i], [k]:v };
    return { ...f, experiences:list };
  });
  const addExp = () => setForm(f=>({
    ...f, experiences:[...f.experiences, { id:'', subtype:'', date:'', time:'' }]
  }));
  const removeExp = (i) => setForm(f=>({
    ...f, experiences: f.experiences.length>1 ? f.experiences.filter((_,j)=>j!==i) : f.experiences
  }));

  const onSubmit = (e) => {
    e.preventDefault();
    const bookingNumber = 'MV' + Date.now().toString().slice(-6);
    // Stash for the confirmation page (so the receipt can render).
    window.miaviaBooking = {
      ...form,
      property: data.title,
      bookingNumber,
      timestamp: Date.now()
    };
    // Forward to Formspree → email + #website-contact Slack channel.
    // This way the concierge has the inquiry even before Stripe is wired.
    if (MIAVIA_CONTACT_ENDPOINT) {
      const expSummary = (form.experiences||[])
        .filter(e=>e.id)
        .map(e=>{
          const lbl = (typeof EXP_LABELS !== 'undefined' && EXP_LABELS[e.id]) || e.id;
          const sub = e.subtype ? ' (' + e.subtype + ')' : '';
          return lbl + sub + (e.date ? ' on ' + e.date : '') + (e.time ? ' at ' + e.time : '');
        })
        .join('; ');
      try {
        fetch(MIAVIA_CONTACT_ENDPOINT, {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'accept': 'application/json' },
          body: JSON.stringify({
            _subject: 'New Miavia booking — ' + form.firstName + ' ' + form.lastName + ' for ' + data.title,
            type: 'Property booking',
            booking_number: bookingNumber,
            name: form.firstName + ' ' + form.lastName,
            email: form.email,
            phone: [form.countryCode, form.phone].filter(Boolean).join(' '),
            birthday: form.birthday,
            language: form.language,
            destination: form.destination,
            property: data.title,
            guests: form.guests,
            stay_type: form.dateMode === 'one-day' ? 'One day' : 'Multiple days',
            check_in: form.checkIn,
            check_out: form.checkOut,
            experiences: expSummary || '—',
            notes: form.notes
          })
        }).catch(() => {});
      } catch (_) { /* never block the user on this */ }
    }
    // If a "stay" deposit Payment Link is configured, redirect to Stripe.
    const stripeLinks = (typeof window !== 'undefined' && window.MIAVIA_STRIPE_LINKS) || {};
    const stayUrl = stripeLinks.stay;
    if (stayUrl) {
      const sep = stayUrl.indexOf('?') === -1 ? '?' : '&';
      const params = new URLSearchParams({
        client_reference_id: bookingNumber,
        prefilled_email: form.email
      }).toString();
      window.location.href = stayUrl + sep + params;
      return;
    }
    window.navigateTo('confirmation');
  };

  // Dark aesthetic per the boss's reference — black background with white
  // text, matched to the experience-page bottom forms ("Begin your stay.").
  const inp = {
    width:'100%', padding:'14px 0', background:'transparent',
    border:'none', borderBottom:'1px solid rgba(255,255,255,0.22)',
    fontFamily:'DM Sans, sans-serif', fontSize:14, color:'#FAF8F5',
    outline:'none', fontWeight:300
  };
  const lbl = {
    display:'block', fontSize:9, letterSpacing:2.5, textTransform:'uppercase',
    color:'rgba(255,255,255,0.55)', fontFamily:'DM Sans, sans-serif', marginBottom:6
  };

  const allExp = (data.allExperiences && data.allExperiences.length)
    ? data.allExperiences
    : [...(data.featuredExperiences||[]), ...((data.otherExperiences||[]).map(e=>e.id||e))]
        .filter((v,i,a)=>v && a.indexOf(v)===i);

  // Auth gate — guests see a sign-in CTA in the booking-form slot instead
  // of the form itself. Stays inline so the property page above is fully
  // browseable without an account.
  if (isLoaded && !isSignedIn) {
    return (
      <div style={{ background:'#0A0A0A', color:'#FAF8F5', padding:'120px 40px',
        borderTop:'1px solid rgba(255,255,255,0.08)' }}>
        <div style={{ maxWidth:560, margin:'0 auto', textAlign:'center' }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:24 }}>
            <Logo size="sm" tone="white" />
          </div>
          <h2 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(28px,3.6vw,44px)', fontWeight:400, color:'#FAF8F5',
            letterSpacing:'0.04em', marginBottom:18, textTransform:'uppercase' }}>
            {t('gate.members_only')}
          </h2>
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:17, color:'rgba(255,255,255,0.72)', lineHeight:1.6,
            maxWidth:480, margin:'0 auto 36px' }}>
            {t('gate.booking_reserved')}
          </p>
          <div style={{ display:'flex', gap:14, justifyContent:'center', flexWrap:'wrap' }}>
            <button onClick={()=>openSignIn()} style={{
              padding:'16px 44px', background:'#FAF8F5', color:'#0A0A0A',
              border:'1px solid #FAF8F5', fontSize:11, letterSpacing:3,
              textTransform:'uppercase', fontFamily:'DM Sans, sans-serif', cursor:'pointer'
            }}>{t('menu.signin')}</button>
            <button onClick={()=>openSignUp()} style={{
              padding:'16px 44px', background:'transparent', color:'#FAF8F5',
              border:'1px solid rgba(255,255,255,0.6)', fontSize:11, letterSpacing:3,
              textTransform:'uppercase', fontFamily:'DM Sans, sans-serif', cursor:'pointer'
            }}>{t('menu.become_member')}</button>
          </div>
        </div>
      </div>
    );
  }

  // Pending-approval gate — applicant has signed up + verified email but
  // the concierge hasn't approved them in the Clerk dashboard yet.
  if (isLoaded && isSignedIn && !isApproved) {
    return (
      <div style={{ background:'#0A0A0A', color:'#FAF8F5', padding:'120px 40px',
        borderTop:'1px solid rgba(255,255,255,0.08)' }}>
        <div style={{ maxWidth:560, margin:'0 auto', textAlign:'center' }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:24 }}>
            <Logo size="sm" tone="white" />
          </div>
          <h2 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(28px,3.6vw,44px)', fontWeight:400, color:'#FAF8F5',
            letterSpacing:'0.04em', marginBottom:18, textTransform:'uppercase' }}>
            {t('gate.pending_title')}
          </h2>
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:17, color:'rgba(255,255,255,0.72)', lineHeight:1.6,
            maxWidth:480, margin:'0 auto 14px' }}>
            {t('gate.pending_top')}
          </p>
          <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:13,
            color:'rgba(255,255,255,0.55)', lineHeight:1.7, maxWidth:480,
            margin:'0 auto' }}>
            {t('gate.pending_bottom')}
          </p>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background:'#0A0A0A', color:'#FAF8F5', padding:'120px 40px',
      borderTop:'1px solid rgba(255,255,255,0.08)' }}>
      <div style={{ maxWidth:760, margin:'0 auto' }}>
        <div style={{ textAlign:'center', marginBottom:56 }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
            <Logo size="sm" tone="white" />
          </div>
          <h2 style={{ fontFamily:"'Playfair Display', Fraunces, Cormorant Garamond, serif",
            fontSize:'clamp(32px,4vw,52px)', fontWeight:400, color:'#FAF8F5',
            letterSpacing:'0.04em', marginBottom:16, textTransform:'uppercase' }}>
            {t('booking.begin_story')}
          </h2>
          <p style={{ fontFamily:'Cormorant Garamond, serif', fontStyle:'italic',
            fontSize:17, color:'rgba(255,255,255,0.7)', lineHeight:1.6, maxWidth:520,
            margin:'0 auto' }}>
            {t('booking.lead')}
          </p>
        </div>

        <form onSubmit={onSubmit} style={{ display:'flex', flexDirection:'column', gap:36 }}>
          {/* Personal — pre-filled from Clerk profile when signed in */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:32 }}>
            <div>
              <label style={lbl}>{t('booking.first_name')}</label>
              <input style={inp} required value={form.firstName}
                onChange={e=>set('firstName', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.last_name')}</label>
              <input style={inp} required value={form.lastName}
                onChange={e=>set('lastName', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.email')}</label>
              <input style={inp} type="email" required value={form.email}
                onChange={e=>set('email', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.phone')}</label>
              <input style={inp} type="tel" value={form.phone}
                onChange={e=>set('phone', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.birthday')}</label>
              <input style={inp} type="date" value={form.birthday}
                onChange={e=>set('birthday', e.target.value)} />
            </div>
            <div>
              <label style={lbl}>{t('booking.language_field')}</label>
              <select style={inp} value={form.language}
                onChange={e=>set('language', e.target.value)}>
                {['English','Français','Italiano','Español','Deutsch'].map(l=>(
                  <option key={l} value={l} style={{color:'#111'}}>{l}</option>
                ))}
              </select>
            </div>
          </div>

          {/* Destination + Guests — Suite removed (members book Var or Yacht) */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:32 }}>
            <div>
              <label style={lbl}>{t('booking.destination')}</label>
              <select style={inp} required value={form.destination}
                onChange={e=>set('destination', e.target.value)}>
                <option value="" style={{color:'#111'}}>{t('booking.select')}</option>
                <option value="flyosc" style={{color:'#111'}}>{t('booking.dest_var')}</option>
                <option value="yachting" style={{color:'#111'}}>{t('booking.dest_yacht')}</option>
              </select>
            </div>
            <div>
              <label style={lbl}>{t('booking.guests')}</label>
              <input style={inp} type="number" min="1" value={form.guests}
                onChange={e=>set('guests', e.target.value)}
                placeholder={t('booking.guests_placeholder')} />
            </div>
          </div>

          {/* Date mode + calendar */}
          <div>
            <label style={lbl}>{t('booking.date')}</label>
            <div style={{ display:'flex', gap:0, marginTop:4, marginBottom:18,
              border:'1px solid rgba(255,255,255,0.22)', width:'fit-content' }}>
              {[
                { id:'multiple-days', label: t('booking.multiple_days') },
                { id:'one-day',       label: t('booking.one_day') }
              ].map(opt=>(
                <button key={opt.id} type="button"
                  onClick={()=>set('dateMode', opt.id)}
                  style={{
                    padding:'12px 24px', cursor:'pointer',
                    background: form.dateMode===opt.id ? '#FAF8F5' : 'transparent',
                    color: form.dateMode===opt.id ? '#0A0A0A' : 'rgba(255,255,255,0.78)',
                    border:'none',
                    fontSize:10, letterSpacing:2.2, textTransform:'uppercase',
                    fontFamily:'DM Sans, sans-serif',
                    transition:'all 0.3s ease'
                  }}>
                  {opt.label}
                </button>
              ))}
            </div>
            {form.dateMode === 'one-day' ? (
              <div style={{ maxWidth:300 }}>
                <label style={lbl}>{t('booking.calendar')}</label>
                <input style={inp} type="date" required value={form.checkIn}
                  onChange={e=>{ set('checkIn', e.target.value); set('checkOut', e.target.value); }} />
              </div>
            ) : (
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:32 }}>
                <div>
                  <label style={lbl}>{t('booking.check_in')}</label>
                  <input style={inp} type="date" required value={form.checkIn}
                    onChange={e=>set('checkIn', e.target.value)} />
                </div>
                <div>
                  <label style={lbl}>{t('booking.check_out')}</label>
                  <input style={inp} type="date" required value={form.checkOut}
                    onChange={e=>set('checkOut', e.target.value)} />
                </div>
              </div>
            )}
          </div>

          {/* Per-experience bookings — destination-aware filtering */}
          <div>
            <p style={{ fontSize:10, letterSpacing:3, textTransform:'uppercase',
              color:'rgba(255,255,255,0.55)', fontFamily:'DM Sans, sans-serif', marginBottom:18 }}>
              {t('booking.experiences_section')}
            </p>
            {form.experiences.map((e,i)=>{
              // Filter experiences by selected destination, or show all if none chosen
              const visibleExp = form.destination
                ? Object.keys(EXP_DESTINATIONS).filter(id => EXP_DESTINATIONS[id].includes(form.destination))
                : Object.keys(EXP_DESTINATIONS);
              const subtypes = EXP_SUBTYPES[e.id];
              return (
                <div key={i} style={{ marginBottom:18, paddingBottom:18,
                  borderBottom: i<form.experiences.length-1 ? '1px dashed rgba(255,255,255,0.15)' : 'none' }}>
                  <div style={{
                    display:'grid', gridTemplateColumns:'1.3fr 1fr 1fr 28px', gap:24,
                    alignItems:'end' }}>
                    <div>
                      <label style={lbl}>{t('booking.experience_n')} {i+1}</label>
                      <select style={inp} value={e.id}
                        onChange={ev=>{
                          const newId = ev.target.value;
                          // If picking an experience whose destinations don't include the
                          // current one, auto-set destination to its first available.
                          const dests = EXP_DESTINATIONS[newId] || [];
                          if (newId && form.destination && !dests.includes(form.destination)) {
                            setForm(f=>({ ...f, destination: dests[0] }));
                          } else if (newId && !form.destination && dests.length === 1) {
                            setForm(f=>({ ...f, destination: dests[0] }));
                          }
                          setExp(i,'id',newId);
                          setExp(i,'subtype','');
                        }}>
                        <option value="" style={{color:'#111'}}>{t('booking.select')}</option>
                        {visibleExp.map(expId=>(
                          <option key={expId} value={expId} style={{color:'#111'}}>
                            {EXP_LABELS[expId]||expId}
                          </option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label style={lbl}>{t('booking.date').replace('*','')}</label>
                      <input style={inp} type="date" value={e.date}
                        onChange={ev=>setExp(i,'date',ev.target.value)} />
                    </div>
                    <div>
                      <label style={lbl}>{t('booking.time')}</label>
                      <input style={inp} type="time" value={e.time}
                        onChange={ev=>setExp(i,'time',ev.target.value)} />
                    </div>
                    <button type="button" onClick={()=>removeExp(i)}
                      title="Remove experience"
                      style={{ background:'none', border:'none', color:'rgba(255,255,255,0.55)',
                        cursor:'pointer', fontSize:20, padding:4, lineHeight:1 }}>×</button>
                  </div>
                  {/* Subtype picker (only for yoga / wine) */}
                  {subtypes && (
                    <div style={{ marginTop:14, maxWidth:400 }}>
                      <label style={lbl}>{t('booking.type')}</label>
                      <select style={inp} value={e.subtype || ''}
                        onChange={ev=>setExp(i,'subtype',ev.target.value)}>
                        <option value="" style={{color:'#111'}}>{t('booking.select')}</option>
                        {subtypes.map(s=>(
                          <option key={s} value={s} style={{color:'#111'}}>{s}</option>
                        ))}
                      </select>
                    </div>
                  )}
                  {/* Auto pricing label — pulled from EXP_PRICING */}
                  {e.id && EXP_PRICING[e.id] && (
                    <p style={{ marginTop:12, fontFamily:'Cormorant Garamond, serif',
                      fontStyle:'italic', fontSize:14,
                      color:'rgba(255,255,255,0.62)' }}>
                      {EXP_PRICING[e.id].label}
                    </p>
                  )}
                </div>
              );
            })}
            <button type="button" onClick={addExp} style={{
              background:'transparent', border:'1px solid rgba(255,255,255,0.4)',
              padding:'10px 20px', fontSize:10, letterSpacing:2.2,
              textTransform:'uppercase', color:'rgba(255,255,255,0.78)',
              fontFamily:'DM Sans, sans-serif', cursor:'pointer', marginTop:8
            }}>{t('booking.add_another')}</button>
          </div>

          {/* Notes */}
          <div>
            <label style={lbl}>{t('booking.notes')}</label>
            <textarea
              rows={4}
              value={form.notes}
              onChange={e=>set('notes', e.target.value)}
              placeholder={t('booking.notes_placeholder')}
              style={{ ...inp, padding:'14px 0', resize:'vertical' }} />
          </div>

          <div style={{ display:'flex', justifyContent:'center', marginTop:16 }}>
            <button type="submit" style={{
              padding:'18px 60px', background:'#FAF8F5',
              border:'1px solid #FAF8F5', color:'#0A0A0A',
              fontSize:11, letterSpacing:3, textTransform:'uppercase',
              fontFamily:'DM Sans, sans-serif', fontWeight:400,
              cursor:'pointer', transition:'all 0.4s ease'
            }}
              onMouseEnter={e=>{ e.currentTarget.style.background='#7A1F2B'; e.currentTarget.style.color='#FAF8F5'; e.currentTarget.style.borderColor='#7A1F2B'; }}
              onMouseLeave={e=>{ e.currentTarget.style.background='#FAF8F5'; e.currentTarget.style.color='#0A0A0A'; e.currentTarget.style.borderColor='#FAF8F5'; }}>
              {t('booking.continue')}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

    { value:'breakfast', label:'Breakfast at Anchor', desc:'Fresh fruit, pastries, strong coffee in a still cove.' },
    { value:'dinner', label:'Sunset Dinner', desc:'A chef\'s table as the sky changes colour.' },
    { value:'massage', label:'Massage', desc:'An hour of stillness, the sea beneath you.' },

  ];

  if(submitted) return <FormSuccess onBack={()=>{setSubmitted(false);window.navigateTo('home')}} />;

  return (
    <div style={{ background:'#FAF8F5', paddingTop:90, minHeight:'100vh' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', minHeight:'80vh' }}>

        {/* LEFT — Form */}

            fontSize:'clamp(28px,3.5vw,44px)', fontWeight:300,
            color:'#111', lineHeight:1.1, marginBottom:40, letterSpacing:-0.3 }}>
            Your Enquiry

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 32px' }}>
            <FloatInput label="First Name" value={form.firstName} onChange={e=>set('firstName',e.target.value)} required />
            <FloatInput label="Last Name" value={form.lastName} onChange={e=>set('lastName',e.target.value)} required />

          <FloatInput label="Email Address" type="email" value={form.email} onChange={e=>set('email',e.target.value)} required />

          <FloatInput label="Preferred Date" type="date" value={form.date} onChange={e=>set('date',e.target.value)} />
          <FloatSelect label="Duration" value={form.duration} onChange={e=>set('duration',e.target.value)} required

          <FloatSelect label="Primary Experience" value={form.experience} onChange={e=>set('experience',e.target.value)}

          <FloatInput label="Number of Guests" type="number" value={form.guests} onChange={e=>set('guests',e.target.value)} />

                    style={{ padding:'16px 0', borderBottom:'1px solid #F0EBE4',
                      cursor:'pointer', display:'flex', gap:16, alignItems:'flex-start' }}>
                    <span style={{ width:8, height:8, borderRadius:'50%', marginTop:5, flexShrink:0,
                      background: form.duration===d.value ? '#7A1F2B' : '#C8C2BA' }} />
                    <div>
                      <p style={{ fontFamily:'Cormorant Garamond, serif', fontSize:18,
                        fontWeight:300, color:'#111', marginBottom:4 }}>{d.label}</p>

                        color:'#9A9089', lineHeight:1.6 }}>{d.desc}</p>
                    </div>

                ))}
              </div>
            )}
          </div>

          {/* Experience panel */}
          <div>
            <button onClick={()=>setOpenPanel(openPanel==='exp'?null:'exp')}
              style={{ width:'100%', background:'none', border:'none', cursor:'pointer',
                display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'20px 0', borderBottom:'1px solid #E8E2D9' }}>
              <span style={{ fontFamily:'DM Sans, sans-serif', fontSize:11,
                letterSpacing:2, textTransform:'uppercase', color:'#111' }}>
                Onboard Experiences
              </span>
              <Chevron dir={openPanel==='exp'?'up':'down'} size={14} color="#9A9089" />
            </button>
            {openPanel==='exp' && (
              <div style={{ padding:'16px 0 8px' }}>
                {onboardExp.map(e=>(
                  <div key={e.value} onClick={()=>set('experience',e.value)}
                    style={{ padding:'16px 0', borderBottom:'1px solid #F0EBE4',
                      cursor:'pointer', display:'flex', gap:16, alignItems:'flex-start' }}>
                    <span style={{ width:8, height:8, borderRadius:'50%', marginTop:5, flexShrink:0,
                      background: form.experience===e.value ? '#7A1F2B' : '#C8C2BA' }} />
                    <div>
                      <p style={{ fontFamily:'Cormorant Garamond, serif', fontSize:18,
                        fontWeight:300, color:'#111', marginBottom:4 }}>{e.label}</p>
                      <p style={{ fontFamily:'DM Sans, sans-serif', fontSize:13,
                        color:'#9A9089', lineHeight:1.6 }}>{e.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      <SiteFooter />
    </div>
  );
}
